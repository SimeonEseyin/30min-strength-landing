<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin | DevDad Strength</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Source+Sans+3:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Source Sans 3', sans-serif;
      background: #0a0a0a;
      color: #fff;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    .card {
      background: #1a1a1a;
      border: 1px solid #262626;
      border-radius: 12px;
      padding: 40px;
      width: 100%;
      max-width: 400px;
    }
    h1 { font-size: 1.5rem; font-weight: 700; margin-bottom: 8px; }
    p  { color: #a3a3a3; font-size: 0.9rem; margin-bottom: 28px; }
    label { display: block; font-size: 0.85rem; color: #a3a3a3; margin-bottom: 8px; }
    input[type="password"] {
      width: 100%;
      background: #0a0a0a;
      border: 1px solid #262626;
      border-radius: 8px;
      color: #fff;
      padding: 12px 16px;
      font-size: 1rem;
      margin-bottom: 16px;
      outline: none;
    }
    input[type="password"]:focus { border-color: #f97316; }
    button {
      width: 100%;
      background: #f97316;
      color: #fff;
      border: none;
      border-radius: 8px;
      padding: 13px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
    }
    button:disabled { opacity: 0.6; cursor: default; }
    .error {
      display: none;
      color: #f97316;
      font-size: 0.85rem;
      margin-top: 12px;
      text-align: center;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>DevDad Admin</h1>
    <p>Enter your admin token to access the app.</p>
    <form id="form">
      <label for="token">Admin Token</label>
      <input type="password" id="token" autocomplete="current-password" required autofocus>
      <button type="submit" id="btn">Verify</button>
      <p class="error" id="error">Invalid token. Try again.</p>
    </form>
  </div>

  <script>
    document.getElementById('form').addEventListener('submit', async function(e) {
      e.preventDefault();
      const token = document.getElementById('token').value;
      const btn   = document.getElementById('btn');
      const err   = document.getElementById('error');

      btn.disabled    = true;
      btn.textContent = 'Verifying…';
      err.style.display = 'none';

      try {
        const res  = await fetch('/.netlify/functions/admin-auth', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ token }),
        });
        const data = await res.json();

        if (data.ok) {
          localStorage.setItem('devDadVerified', '1');
          window.location.href = '/app';
        } else {
          err.style.display = 'block';
          btn.disabled    = false;
          btn.textContent = 'Verify';
        }
      } catch {
        err.style.display   = 'block';
        err.textContent     = 'Something went wrong. Try again.';
        btn.disabled        = false;
        btn.textContent     = 'Verify';
      }
    });
  </script>
</body>
</html>
