<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dev Dad Strength | The 30-Minute System</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0a0a0a;
    }

    :root {
            --bg-primary: #000000;
            --bg-secondary: #000000;
            --bg-card: #181818;
            --bg-card-hover: #222222;
            --bg-selected: #e8e4db;
            --text-primary: #e8e4db;
            --text-secondary: #a09a90;
            --text-muted: #706b62;
            --text-dark: #000000;
            --accent: #f97316;
            --accent-hover: #fb923c;
            --accent-light: #fb923c;
            --accent-glow: rgba(249, 115, 22, 0.4);
            --success: #22c55e;
            --border: #333333;
    }
    .btn-primary {
      background: #0a0a0a;
      color: var(--accent);
      padding: 16px 32px;
      border-radius: 12px;
      font-weight: 600;
      width: 100%;
      border: none;
      cursor: pointer;
      transition: all 0.2s;
    }
    .btn-primary:hover {
      background: #1E4468;
    }
    .btn-secondary {
      background: #E8F0F7;
      color: var(--accent);
      padding: 16px 32px;
      border-radius: 12px;
      font-weight: 600;
      width: 100%;
      border: none;
      cursor: pointer;
    }

    .nav-cta {
      background: transparent;
      border: 1px solid var(--accent);
      border-radius: 12px;
      color: var(--accent);
      padding: 16px 32px;
      width: 100%;
      font-size: 0.875rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      cursor: pointer;
      transition: all 0.2s ease;
      text-decoration: none;
    }

    .nav-cta:hover {
      background: var(--accent);
      color: var(--bg-primary);
    }

    .nav-cta:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .card {
      background: #E8F0F7;
      border-radius: 16px;
      padding: 20px;
      margin-bottom: 16px;
      box-shadow: 0 2px 8px rgba(44,95,141,0.08);
      border: 1px solid #E8F0F7;
    }
    .exercise-card {
      background: white;
      border-radius: 12px;
      padding: 12px;
      margin-bottom: 12px;
      display: flex;
      align-items: center;
      gap: 12px;
      box-shadow: 0 1px 4px rgba(44,95,141,0.06);
      border: 1px solid #F0F4F8;
    }
    .day-tab {
      width: 60px;
      height: 80px;
      border-radius: 12px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: all 0.2s;
    }
    .day-tab.active {
      background: #2C5F8D;
      color: white;
      border: 3px solid #4A7BA7;
    }
    .day-tab.inactive {
      background: #E8F0F7;
      color: #2C5F8D;
    }
    .day-tab.locked {
      background: #F5F7F9;
      color: #CCC;
      cursor: not-allowed;
    }
    .progress-bar {
      height: 8px;
      background: #E8F0F7;
      border-radius: 4px;
      overflow: hidden;
    }
    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, #2C5F8D 0%, #4A7BA7 100%);
      transition: width 0.3s;
    }
    input[type="text"], input[type="email"], input[type="password"], input[type="number"], select {
      width: 100%;
      padding: 16px;
      border: 1px solid #E8F0F7;
      border-radius: 12px;
      background: white;
      font-size: 16px;
      transition: border-color 0.2s;
    }
    input[type="text"]:focus, input[type="email"]:focus, input[type="password"]:focus, input[type="number"]:focus, select:focus {
      outline: none;
      border-color: #2C5F8D;
    }
    input[type="text"]:focus-visible, input[type="email"]:focus-visible, input[type="password"]:focus-visible, input[type="number"]:focus-visible, select:focus-visible {
      outline: none;
      border-color: #2C5F8D;
    }
    .section-label {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 1px;
      color: #6B7280;
      margin: 24px 0 12px 0;
    }
    .dev-badge {
      display: inline-block;
      background: #E8F0F7;
      color: #2C5F8D;
      padding: 4px 12px;
      border-radius: 6px;
      font-size: 12px;
      font-weight: 600;
      font-family: 'Courier New', monospace;
    }

    .video-wrapper {
      position: relative;
      width: 100%;
      aspect-ratio: 16 / 9;
      overflow: hidden;
    }

    .video-wrapper video {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .error-box {
      background: #FEE2E2;
      border: 1px solid #FCA5A5;
      color: #DC2626;
      padding: 12px 16px;
      border-radius: 8px;
      margin-bottom: 16px;
      font-size: 14px;
    }

    .success-box {
      background: #D1FAE5;
      border: 1px solid #6EE7B7;
      color: #059669;
      padding: 12px 16px;
      border-radius: 8px;
      margin-bottom: 16px;
      font-size: 14px;
    }

      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0, 0, 0, 0.7);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 1000;
      padding: 20px;
    }

    .modal-content {
      background: white;
      border-radius: 16px;
      max-width: 500px;
      width: 100%;
      max-height: 90vh;
      overflow-y: auto;
      padding: 24px;
    }

    .feedback-btn {
      padding: 12px;
      border: 2px solid #E8F0F7;
      border-radius: 8px;
      background: white;
      cursor: pointer;
      transition: all 0.2s;
      text-align: left;
    }

    .feedback-btn:hover {
      border-color: #2C5F8D;
      background: #F8F9FA;
    }

    .feedback-btn.selected {
      border-color: #2C5F8D;
      background: #E8F0F7;
    }

    .achievement-badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: #FEF3C7;
      border: 2px solid #F59E0B;
      color: #92400E;
      padding: 8px 16px;
      border-radius: 12px;
      font-weight: 600;
      margin: 8px;
    }

    .confetti {
      position: absolute;
      width: 10px;
      height: 10px;
      background: #f97316;
      animation: confetti-fall 3s linear infinite;
    }

    @keyframes confetti-fall {
      to {
        transform: translateY(100vh) rotate(360deg);
        opacity: 0;
      }
    }
  </style>
</head>

    function App() {
      // Navigation & UI State
      const [screen, setScreen] = useState('welcome');
      const [showGoalsModal, setShowGoalsModal] = useState(false);
      
      // Workout State
      const [currentWeek, setCurrentWeek] = useState(1);
      const [currentDay, setCurrentDay] = useState(1);
      const [completedDays, setCompletedDays] = useState([]);
      const [workoutStarted, setWorkoutStarted] = useState(false);
      const [currentExercise, setCurrentExercise] = useState(0);
      const [workoutFeedback, setWorkoutFeedback] = useState({});
      
      // Goals State
      const [goals, setGoals] = useState({
        targetWeight: '',
        strengthGoal: '',
        consistencyGoal: 80, // percentage
        customGoal: ''
      });
      
      // Rest day skip state
      const [showSkipRestModal, setShowSkipRestModal] = useState(false);
      const [skipRestWarningLevel, setSkipRestWarningLevel] = useState(0);
      
      // Auth State
      const [email, setEmail] = useState('');
      const [password, setPassword] = useState('');
      const [confirmPassword, setConfirmPassword] = useState('');
      const [loginEmail, setLoginEmail] = useState('');
      const [loginPassword, setLoginPassword] = useState('');
      const [isLoggedIn, setIsLoggedIn] = useState(false);
      const [currentUser, setCurrentUser] = useState(null);
      const [error, setError] = useState('');
      const [success, setSuccess] = useState('');

      const totalWeeks = 12;
      const currentPhase = currentWeek <= 4 ? 'Foundation' : currentWeek <= 8 ? 'Build' : 'Peak';
      // Phase 1-2: 5 workouts/week × 8 weeks = 40
      // Phase 3: 6 workouts/week × 4 weeks = 24
      // Total: 64 workouts
      const totalWorkouts = 64;

      // Helper function to get workout type and exercise day for a given calendar day
      const getWorkoutInfo = (calendarDay, week) => {
        const isPeakPhase = week > 8;
        
        // Map calendar days to workout programs
        // Phase 1-2: Days 1,2,3,5,6 are workouts (rest: 4,7)
        // Phase 3: Days 1,2,3,4,5,6 are workouts (rest: 7)
        
        const workoutTypes = ['Push', 'Pull', 'Lower', 'Full Body Power'];
        
        if (isPeakPhase) {
          // Phase 3: 6 workouts/week, cycling through all 4 types
          const workoutMapping = {
            1: { type: 'Push', exerciseDay: 'day1' },
            2: { type: 'Pull', exerciseDay: 'day2' },
            3: { type: 'Lower', exerciseDay: 'day3' },
            4: { type: 'Full Body Power', exerciseDay: 'day4' },
            5: { type: 'Push', exerciseDay: 'day1' },
            6: { type: 'Pull', exerciseDay: 'day2' }
          };
          return workoutMapping[calendarDay] || null;
        } else {
          // Phase 1-2: 5 workouts/week
          const workoutMapping = {
            1: { type: 'Push', exerciseDay: 'day1' },
            2: { type: 'Pull', exerciseDay: 'day2' },
            3: { type: 'Lower', exerciseDay: 'day3' },
            5: { type: 'Full Body Power', exerciseDay: 'day4' },
            6: { type: 'Push', exerciseDay: 'day1' }
          };
          return workoutMapping[calendarDay] || null;
        }
      };

      // Calculate week from completed days (4 workouts per week)
      const calculateWeekFromWorkouts = (completedCount) => {
        return Math.floor(completedCount / 4) + 1;
      };

      // Check for existing session on component mount
      useEffect(() => {
        const session = localStorage.getItem('devDadSession');
        if (session) {
          try {
            const userData = JSON.parse(session);
            setCurrentUser(userData);
            setIsLoggedIn(true);
            setEmail(userData.email);
            
            // Load user progress
            const userProgress = localStorage.getItem(`progress_${userData.email}`);
            if (userProgress) {
              const progress = JSON.parse(userProgress);
              setCurrentWeek(progress.currentWeek || 1);
              setCurrentDay(progress.currentDay || 1);
              setCompletedDays(progress.completedDays || []);
              setWorkoutFeedback(progress.workoutFeedback || {});
              setGoals(progress.goals || {
                targetWeight: '',
                strengthGoal: '',
                consistencyGoal: 80,
                customGoal: ''
              });
            }
            
            setScreen('home');
          } catch (e) {
            console.error('Session load error:', e);
            localStorage.removeItem('devDadSession');
          }
        }
      }, []);

      // Auto-save progress whenever it changes
      useEffect(() => {
        if (isLoggedIn && currentUser) {
          const progress = {
            currentWeek,
            currentDay,
            completedDays,
            workoutFeedback,
            goals,
            lastUpdated: new Date().toISOString()
          };
          localStorage.setItem(`progress_${currentUser.email}`, JSON.stringify(progress));
        }
      }, [currentWeek, currentDay, completedDays, workoutFeedback, goals, isLoggedIn, currentUser]);

      // Handle user signup
      const handleSignup = () => {
        setError('');
        setSuccess('');

        if (!email || !password || !confirmPassword) {
          setError('Please fill in all fields');
          return;
        }

        if (!email.includes('@') || !email.includes('.')) {
          setError('Please enter a valid email address');
          return;
        }

        if (password.length < 6) {
          setError('Password must be at least 6 characters');
          return;
        }

        if (password !== confirmPassword) {
          setError('Passwords do not match');
          return;
        }

        const existingUsers = JSON.parse(localStorage.getItem('devDadUsers') || '[]');
        if (existingUsers.find(u => u.email.toLowerCase() === email.toLowerCase())) {
          setError('An account with this email already exists. Please log in.');
          return;
        }

        const newUser = {
          email: email.toLowerCase(),
          password,
          createdAt: new Date().toISOString(),
          name: email.split('@')[0]
        };

        existingUsers.push(newUser);
        localStorage.setItem('devDadUsers', JSON.stringify(existingUsers));

        const sessionData = { 
          email: newUser.email, 
          name: newUser.name,
          loginTime: new Date().toISOString()
        };
        localStorage.setItem('devDadSession', JSON.stringify(sessionData));
        
        setCurrentUser(sessionData);
        setIsLoggedIn(true);
        setSuccess('Account created successfully!');

        setTimeout(() => {
          setShowGoalsModal(true);
          setScreen('home');
          setError('');
          setSuccess('');
          setPassword('');
          setConfirmPassword('');
        }, 1000);
      };

      // Handle user login
      const handleLogin = () => {
        setError('');
        setSuccess('');

        if (!loginEmail || !loginPassword) {
          setError('Please fill in all fields');
          return;
        }

        const users = JSON.parse(localStorage.getItem('devDadUsers') || '[]');
        const user = users.find(u => 
          u.email.toLowerCase() === loginEmail.toLowerCase() && 
          u.password === loginPassword
        );

        if (!user) {
          setError('Invalid email or password');
          return;
        }

        const sessionData = {
          email: user.email,
          name: user.name || user.email.split('@')[0],
          loginTime: new Date().toISOString()
        };
        localStorage.setItem('devDadSession', JSON.stringify(sessionData));
        
        setCurrentUser(sessionData);
        setIsLoggedIn(true);
        setEmail(user.email);

        const userProgress = localStorage.getItem(`progress_${user.email}`);
        if (userProgress) {
          try {
            const progress = JSON.parse(userProgress);
            setCurrentWeek(progress.currentWeek || 1);
            setCurrentDay(progress.currentDay || 1);
            setCompletedDays(progress.completedDays || []);
            setWorkoutFeedback(progress.workoutFeedback || {});
            setGoals(progress.goals || {
              targetWeight: '',
              strengthGoal: '',
              consistencyGoal: 80,

              <button className="w-full p-4 bg-white rounded-lg mb-3 flex items-center justify-between">
                <span className="font-semibold">Email</span>
                <span className="text-gray-600 text-sm">{email || 'user@example.com'}</span>
              </button>

              <button className="btn-secondary mt-6" onClick={handleLogout}>
                Log Out
              </button>
            </div>
          </div>
        );
      }
    }

    ReactDOM.render(<App />, document.getElementById('root'));
  </script>

  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</body>
</html>
