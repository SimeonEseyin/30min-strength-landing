    function App() {
      // Purchase Verification State
      const [hasPurchased, setHasPurchased] = useState(false);
      const [purchaseChecked, setPurchaseChecked] = useState(false);
      const [restoreEmail, setRestoreEmail] = useState('');

      const [workoutStarted, setWorkoutStarted] = useState(false);

      const [skipRestWarningLevel, setSkipRestWarningLevel] = useState(0);
      
      // Auth State
      const [email, setEmail] = useState('');
      const [password, setPassword] = useState('');
      const [confirmPassword, setConfirmPassword] = useState('');
      const [loginEmail, setLoginEmail] = useState('');
      const [loginPassword, setLoginPassword] = useState('');
      const [isLoggedIn, setIsLoggedIn] = useState(false);
      const [currentUser, setCurrentUser] = useState(null);
      const [error, setError] = useState('');
      const [success, setSuccess] = useState('');

      // Settings State
      const [settings, setSettings] = useState({
        units: 'lbs', // 'lbs' or 'kg'
        darkMode: false,
        notificationTime: '07:00'
      });

      // Profile/Tracking State
      const [userProfile, setUserProfile] = useState({
        currentWeight: '',
        height: '',
        weightHistory: [] // {date, weight}
      });

      // Progressive overload — last weight used per exercise name
      const [exerciseWeights, setExerciseWeights] = useState({});

      // Welcome-back
      const [daysSinceLastWorkout, setDaysSinceLastWorkout] = useState(0);

      // Exercise details state
      const [selectedExercise, setSelectedExercise] = useState(null);

      const totalWeeks = 12;
      const currentPhase = currentWeek <= 4 ? 'Foundation' : currentWeek <= 8 ? 'Build' : 'Peak';
      // Phase 1-2: 5 workouts/week × 8 weeks = 40
      // Phase 3: 6 workouts/week × 4 weeks = 24
      // Total: 64 workouts
      const totalWorkouts = 64;

      // Helper function to get workout type and exercise day for a given calendar day
      const getWorkoutInfo = (calendarDay, week) => {
        const isPeakPhase = week > 8;
        
        // Map calendar days to workout programs
        // Phase 1-2: Days 1,2,3,5,6 are workouts (rest: 4,7)
        // Phase 3: Days 1,2,3,4,5,6 are workouts (rest: 7)
        
        const workoutTypes = ['Push', 'Pull', 'Lower', 'Full Body Power'];
        
        if (isPeakPhase) {
          // Phase 3: 6 workouts/week, cycling through all 4 types
          const workoutMapping = {
            1: { type: 'Push', exerciseDay: 'day1' },
            2: { type: 'Pull', exerciseDay: 'day2' },
            3: { type: 'Lower', exerciseDay: 'day3' },
            4: { type: 'Full Body Power', exerciseDay: 'day4' },
            5: { type: 'Push', exerciseDay: 'day1' },
            6: { type: 'Pull', exerciseDay: 'day2' }
          };
          return workoutMapping[calendarDay] || null;
        } else {
          // Phase 1-2: 5 workouts/week
          const workoutMapping = {
            1: { type: 'Push', exerciseDay: 'day1' },
            2: { type: 'Pull', exerciseDay: 'day2' },
            3: { type: 'Lower', exerciseDay: 'day3' },
            5: { type: 'Full Body Power', exerciseDay: 'day4' },
            6: { type: 'Push', exerciseDay: 'day1' }
          };
          return workoutMapping[calendarDay] || null;
        }
      };

      // Calculate week from completed days (4 workouts per week)
      const calculateWeekFromWorkouts = (completedCount) => {
        return Math.floor(completedCount / 4) + 1;
      };

      // Check for purchase verification on component mount
      useEffect(() => {
        const urlParams = new URLSearchParams(window.location.search);
        const sessionId  = urlParams.get('session_id');
        const verified   = localStorage.getItem('devDadVerified');

        // Clean up URL immediately
        if (urlParams.toString()) {
          window.history.replaceState({}, document.title, window.location.pathname);
        }

        if (sessionId && sessionId.startsWith('cs_')) {
          // Server-side verification via Stripe
          fetch('/.netlify/functions/verify-purchase', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ sessionId }),
          })
            .then(r => r.json())
            .then(data => {
              if (data.verified) {
                localStorage.setItem('devDadVerified', '1');
                setHasPurchased(true);
              }
              setPurchaseChecked(true);
            })
            .catch(() => setPurchaseChecked(true));
        } else {
          // Return visit — trust localStorage only if previously server-verified
          if (verified === '1') setHasPurchased(true);
          setPurchaseChecked(true);
        }

      async function restoreAccess(e) {

        setRestoreStatus('loading');

          const res = await fetch('/.netlify/functions/check-access', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ email }),
          });
          const data = await res.json();
          if (data.verified) {
            localStorage.setItem('devDadVerified', '1');
            setHasPurchased(true);
          } else {
            setRestoreStatus('error');
          }
        } catch {
          setRestoreStatus('error');
        }

      // Check for existing session on component mount
      useEffect(() => {
        const session = localStorage.getItem('devDadSession');
        if (session) {
          try {

            // Check session expiration
            if (userData.expiresAt) {
              const now = new Date();
              const expiresAt = new Date(userData.expiresAt);

                localStorage.removeItem('devDadSession');
                setScreen('welcome');
                return;
              }
            }
            
            setCurrentUser(userData);
            setIsLoggedIn(true);
            setEmail(userData.email);
            
            // Load user progress
            const userProgress = localStorage.getItem(`progress_${userData.email}`);
            if (userProgress) {

              setCurrentWeek(progress.currentWeek || 1);
              setCurrentDay(progress.currentDay || 1);
              setCompletedDays(progress.completedDays || []);
              setWorkoutFeedback(progress.workoutFeedback || {});
              setGoals(progress.goals || {
                targetWeight: '',
                strengthGoal: '',
                consistencyGoal: 80,
                customGoal: ''
              });
              setCurrentCycleNumber(progress.currentCycleNumber || 1);
            }

            // Load program history
            const userHistory = localStorage.getItem(`history_${userData.email}`);
            if (userHistory) {
              setProgramHistory(JSON.parse(userHistory));
            }

            // Load user settings
            const userSettings = localStorage.getItem(`settings_${userData.email}`);
            if (userSettings) {
              setSettings(JSON.parse(userSettings));
            }

            // Load user profile
            const profile = localStorage.getItem(`profile_${userData.email}`);
            if (profile) {
              setUserProfile(JSON.parse(profile));
            }

            // Load exercise weights
            const weights = localStorage.getItem(`weights_${userData.email}`);
            if (weights) {
              setExerciseWeights(JSON.parse(weights));
            }

            // Welcome back — check days since last workout
            const feedbackData = progress ? (JSON.parse(progress).workoutFeedback || {}) : {};
            const completedWorkouts = Object.values(feedbackData).filter(f => f.feedback !== 'skipped');
            let daysSince = 0;
            if (completedWorkouts.length > 0) {
              const lastDate = completedWorkouts
                .map(f => new Date(f.date))
                .sort((a, b) => b - a)[0];
              daysSince = Math.floor((Date.now() - lastDate) / 86400000);
            }

            if (daysSince >= 3) {
              setDaysSinceLastWorkout(daysSince);
              setScreen('welcome-back');
            } else {
              setScreen('home');
            }
          } catch (e) {
            localStorage.removeItem('devDadSession');
            setScreen('welcome');
          }
        }
      }, []);

      // Auto-save progress whenever it changes
      useEffect(() => {
        if (isLoggedIn && currentUser) {
          const progress = {
            currentWeek,
            currentDay,
            completedDays,
            workoutFeedback,
            goals,
            currentCycleNumber,
            lastUpdated: new Date().toISOString()
          };
          localStorage.setItem(`progress_${currentUser.email}`, JSON.stringify(progress));
        }
      }, [currentWeek, currentDay, completedDays, workoutFeedback, goals, currentCycleNumber, isLoggedIn, currentUser]);

      // Auto-save settings whenever they change
      useEffect(() => {
        if (isLoggedIn && currentUser) {
          localStorage.setItem(`settings_${currentUser.email}`, JSON.stringify(settings));
        }
      }, [settings, isLoggedIn, currentUser]);

      // Auto-save profile whenever it changes
      useEffect(() => {
        if (isLoggedIn && currentUser) {
          localStorage.setItem(`profile_${currentUser.email}`, JSON.stringify(userProfile));
        }
      }, [userProfile, isLoggedIn, currentUser]);

      // Auto-save exercise weights whenever they change
      useEffect(() => {
        if (isLoggedIn && currentUser) {
          localStorage.setItem(`weights_${currentUser.email}`, JSON.stringify(exerciseWeights));
        }
      }, [exerciseWeights, isLoggedIn, currentUser]);

      // Timer countdown effect
      const [timerSeconds, setTimerSeconds] = useState(45);
      const [timerRunning, setTimerRunning] = useState(false);
      useEffect(() => {
        let interval;
        if (timerRunning && timerSeconds > 0) {
          interval = setInterval(() => {
            setTimerSeconds(prev => {
              if (prev <= 1) {
                setTimerRunning(false);
                return 0;
              }
              return prev - 1;
            });
          }, 1000);
        }
        return () => clearInterval(interval);
      }, [timerRunning, timerSeconds]);

      // Handle user signup
      // ============================================
      // SECURITY HELPER FUNCTIONS
      // ============================================
      
      // Rate limiting storage
      const loginAttempts = React.useRef({});
      
      // Sanitize user inputs
      const sanitizeInput = (input) => {
        if (typeof input !== 'string') return '';
        return String(input)
          .replace(/[<>'"]/g, '')
          .trim()
          .slice(0, 500);
      };
      
      // Validate email format
      const validateEmail = (email) => {
        const emailRegex = /^[a-zA-Z0-9.!#$%&'*+/=?^_`{|}~-]+@[a-zA-Z0-9](?:[a-zA-Z0-9-]{0,61}[a-zA-Z0-9])?(?:\.[a-zA-Z0-9](?:[a-zA-Z0-9-]{0,61}[a-zA-Z0-9])?)*$/;
        return emailRegex.test(email);
      };
      
      // Validate password strength
      const validatePassword = (password) => {
        const errors = [];
        if (password.length < 8) errors.push('at least 8 characters');
        if (!/[A-Z]/.test(password)) errors.push('one uppercase letter');
        if (!/[a-z]/.test(password)) errors.push('one lowercase letter');
        if (!/[0-9]/.test(password)) errors.push('one number');
        
        if (errors.length > 0) {
          return `Password must contain ${errors.join(', ')}`;
        }
        return null;
      };
      
      // Check rate limiting
      const checkRateLimit = (email) => {
        const now = Date.now();
        // Get existing attempts or null
        const existing = loginAttempts.current[email];

        // If no previous attempts, this is the first one - allow it
        if (!existing) {
          loginAttempts.current[email] = { count: 1, firstAttempt: now, lastAttempt: now };
          return { allowed: true };
        }

        // Reset after 15 minutes
        if (now - attempts.firstAttempt > 15 * 60 * 1000) {
          loginAttempts.current[email] = { count: 1, firstAttempt: now, lastAttempt: now };
          return { allowed: true };
        }

        // Prevent spam (min 2 seconds between attempts)
        if (now - existing.lastAttempt < 2000) {
          return { allowed: false, message: 'Please wait before trying again.' };
        }

        // Max 5 attempts per 15 minutes
        if (attempts.count >= 5) {
          const waitTime = Math.ceil((15 * 60 * 1000 - (now - existing.firstAttempt)) / 60000);
          return { allowed: false, message: `Too many attempts. Wait ${waitTime} minute(s).` };
        }

        loginAttempts.current[email].count++;
        loginAttempts.current[email].lastAttempt = now;
        return { allowed: true };
      };

      // Handle user signup - TESTING VERSION (NO HASHING)
      const handleSignup = () => {
        setError('');
        setSuccess('');

        if (!email || !password || !confirmPassword) {
          setError('Please fill in all fields');
          return;
        }

        // Normalize and sanitize email
        const normalizedEmail = sanitizeInput(email.toLowerCase().trim());

        // Validate email format
        if (!validateEmail(normalizedEmail)) {
          setError('Please enter a valid email address');
          return;
        }

        // Validate password strength (relaxed for testing)
        if (password.length < 6) {
          setError('Password must be at least 6 characters');
          return;
        }

        // Check password match
        if (password !== confirmPassword) {
          setError('Passwords do not match');
          return;
        }

        try {
          // Check existing users
          const existingUsers = JSON.parse(localStorage.getItem('devDadUsers') || '[]');
          if (existingUsers.find(u => u.email === normalizedEmail)) {
            setError('An account with this email already exists. Please log in.');
            return;
          }

          // Create user - TESTING: password stored as plaintext
          const newUser = {
            email: normalizedEmail,
            password: password,  // ⚠️ NOT HASHED - TESTING ONLY
            createdAt: new Date().toISOString(),
            name: sanitizeInput(normalizedEmail.split('@')[0])
          };

          existingUsers.push(newUser);
          localStorage.setItem('devDadUsers', JSON.stringify(existingUsers));

          // Create session with expiration
          const sessionData = {
            email: newUser.email,
            name: newUser.name,
            loginTime: new Date().toISOString(),
            expiresAt: new Date(Date.now() + 7 * 24 * 60 * 60 * 1000).toISOString()
          };
          localStorage.setItem('devDadSession', JSON.stringify(sessionData));

          setCurrentUser(sessionData);
          setIsLoggedIn(true);
          setSuccess('Account created successfully!');

          setTimeout(() => {
            setShowGoalsModal(true);
            setScreen('home');
            setError('');
            setSuccess('');
            setEmail('');
            setPassword('');
            setConfirmPassword('');
          }, 1000);
        } catch (error) {
          setError('Account creation failed. Please try again.');
        }
      };

      // Handle user login - TESTING VERSION (NO HASHING)
      const handleLogin = () => {
        setError('');
        setSuccess('');

        if (!loginEmail || !loginPassword) {
          setError('Please fill in all fields');
          return;
        }

        // Normalize and sanitize email
        const normalizedEmail = sanitizeInput(loginEmail.toLowerCase().trim());

        // Validate email format
        if (!validateEmail(normalizedEmail)) {
          setError('Invalid email format');
          return;
        }

        // Check rate limiting
        const rateLimit = checkRateLimit(normalizedEmail);
        if (!rateLimit.allowed) {
          setError(rateLimit.message);
          return;
        }

        try {
          // Get users
          const users = JSON.parse(localStorage.getItem('devDadUsers') || '[]');
          const user = users.find(u => u.email === normalizedEmail);

          if (!user) {
            setError('Invalid email or password');
            return;
          }

          // Check password - TESTING: plaintext comparison
          if (user.password !== loginPassword) {
            setError('Invalid email or password');
            return;
          }


          // Reset rate limit on success
          delete loginAttempts.current[normalizedEmail];

          // Create session with expiration
          const sessionData = {
            email: user.email,
            name: user.name || user.email.split('@')[0],
            loginTime: new Date().toISOString(),
            expiresAt: new Date(Date.now() + 7 * 24 * 60 * 60 * 1000).toISOString()
          };
          localStorage.setItem('devDadSession', JSON.stringify(sessionData));

          setCurrentUser(sessionData);
          setIsLoggedIn(true);
          setEmail(user.email);

          const userProgress = localStorage.getItem(`progress_${user.email}`);
          if (userProgress) {
            try {
              const progress = JSON.parse(userProgress);
              setCurrentWeek(progress.currentWeek || 1);
              setCurrentDay(progress.currentDay || 1);
              setCompletedDays(progress.completedDays || []);
              setWorkoutFeedback(progress.workoutFeedback || {});
              setGoals(progress.goals || {
                targetWeight: '',
                strengthGoal: '',
                consistencyGoal: 80,
                customGoal: ''
              });
              setCurrentCycleNumber(progress.currentCycleNumber || 1);
            } catch (e) {
            }
          }

          // Load program history
          const userHistory = localStorage.getItem(`history_${user.email}`);
          if (userHistory) {
            try {
              setProgramHistory(JSON.parse(userHistory));
            } catch (e) {
            }
          }

          setSuccess('Login successful!');

          setTimeout(() => {
            setScreen('home');
            setError('');
            setSuccess('');
            setLoginEmail('');
            setLoginPassword('');
          }, 800);
        } catch (error) {
          setError('Login failed. Please try again.');
        }
      };

      // Handle user logout
      function handleLogout() {
        if (confirm('Are you sure you want to log out?')) {
          localStorage.removeItem('devDadSession');

          loginAttempts.current = {};
          
          setIsLoggedIn(false);

          setEmail('');
          setPassword('');
          setConfirmPassword('');
          setLoginEmail('');
          setLoginPassword('');
          setCurrentWeek(1);

          setCompletedDays([]);
          setWorkoutFeedback({});
          setGoals({
            targetWeight: '',
            strengthGoal: '',
            consistencyGoal: 80,
            customGoal: ''
          });
          setProgramHistory([]);
          setCurrentCycleNumber(1);
          setError('');
          setSuccess('');
          setScreen('welcome');
        }
      }

      // Handle workout completion with feedback
      const handleWorkoutComplete = (feedback) => {
        
        const workoutKey = `week${currentWeek}_day${currentDay}`;
        const newFeedback = {
          ...workoutFeedback,
          [workoutKey]: {
            feedback,
            date: new Date().toISOString(),
            week: currentWeek,
            day: currentDay
          }
        };
        
        setWorkoutFeedback(newFeedback);
        
        // Add to completed days if not already there
        const dayKey = `w${currentWeek}d${currentDay}`;
        let updatedCompletedDays = completedDays;
        if (!completedDays.includes(dayKey)) {
          updatedCompletedDays = [...completedDays, dayKey];
          setCompletedDays(updatedCompletedDays);
        } else {
        }
        
        
        // Find the next incomplete day in the current week
        let foundNext = false;
        for (let day = 1; day <= 7; day++) {
          const checkKey = `w${currentWeek}d${day}`;
          if (!updatedCompletedDays.includes(checkKey)) {
            // Found next incomplete day
            setCurrentDay(day);
            foundNext = true;
            break;
          }
        }
        
        // If all days in current week are complete
        if (!foundNext) {
          if (currentWeek === 12) {
            // Program complete
            setScreen('completion');
            return;
          } else {
            // Move to next week
            setCurrentWeek(currentWeek + 1);
            setCurrentDay(1);
          }
        }
        
        setScreen('home');
        setWorkoutStarted(false);
      };

      // Save completed cycle to history and start new cycle
      const handleStartNewCycle = () => {
        // Calculate final stats
        const actualWorkouts = Object.values(workoutFeedback).filter(f => f.feedback !== 'skipped').length;
        const consistencyRate = Math.round((actualWorkouts / 64) * 100);
        const perfectWorkouts = Object.values(workoutFeedback).filter(f => f.feedback === 'perfect').length;
        const progressionWorkouts = Object.values(workoutFeedback).filter(f => f.feedback === 'easy').length;
        const achievements = getAchievements();

        // Create history entry
        const cycleHistory = {
          cycleNumber: currentCycleNumber,
          completedDate: new Date().toISOString(),
          totalWorkouts: actualWorkouts,
          consistencyRate,
          perfectWorkouts,
          progressionWorkouts,
          achievements,
          goals: {...goals},
          completedDays: [...completedDays],
          workoutFeedback: {...workoutFeedback}
        };

        // Add to history
        const newHistory = [...programHistory, cycleHistory];
        setProgramHistory(newHistory);

        // Save to localStorage
        if (currentUser) {
          localStorage.setItem(`history_${currentUser.email}`, JSON.stringify(newHistory));
        }

        // Reset for new cycle
        setCurrentWeek(1);
        setCurrentDay(1);
        setCompletedDays([]);
        setWorkoutFeedback({});
        setCurrentCycleNumber(currentCycleNumber + 1);
        setScreen('home');
      };

      // Calculate achievements
      const getAchievements = () => {
        const achievements = [];
        const workoutCount = completedDays.length;
        
        if (workoutCount >= 5) achievements.push({ icon: '🔥', text: 'Week 1 Warrior', desc: 'Completed first week' });
        if (workoutCount >= 10) achievements.push({ icon: '💪', text: 'Two Week Titan', desc: 'Completed 2 weeks' });
        if (workoutCount >= 20) achievements.push({ icon: '⚡', text: 'Consistency King', desc: 'Completed 4 weeks' });
        if (workoutCount >= 64) achievements.push({ icon: '🏆', text: 'Full Program Champion', desc: 'Completed all 12 weeks' });
        
        const perfectWorkouts = Object.values(workoutFeedback).filter(f => f.feedback === 'perfect').length;
        if (perfectWorkouts >= 5) achievements.push({ icon: '🎯', text: 'Perfect Form Master', desc: '5+ perfect workouts' });
        
        const progressWorkouts = Object.values(workoutFeedback).filter(f => f.feedback === 'easy').length;
        if (progressWorkouts >= 3) achievements.push({ icon: '📈', text: 'Progression Pro', desc: 'Ready for heavier weights' });

        return achievements;
      };

      const GoalsModal = () => {

          };

        return (

                  <p className="text-xs text-gray-500 mt-1">Track your weight alongside strength gains</p>
                </div>

                <div>
                  <label className="block text-sm font-semibold mb-2">Strength Milestone - Optional</label>
                  <input
                    type="text"
                    placeholder="e.g., Press 50lb dumbbells, Do 10 pull-ups"
                    value={localGoals.strengthGoal}
                    onChange={(e) => setLocalGoals({...localGoals, strengthGoal: e.target.value})}

                  <p className="text-xs text-gray-500 mt-1">Complete {Math.round(64 * localGoals.consistencyGoal / 100)} of 64 workouts</p>
                </div>

                  <input

                    onChange={(e) => setLocalGoals({...localGoals, customGoal: e.target.value})}
                  />
                  <p className="text-xs text-gray-500 mt-1">Your "why" for doing this</p>
                </div>
              </div>

              <div className="flex gap-3 mt-6">
                <button className="btn-secondary hover:bg-[gray]" onClick={() => setShowGoalsModal(false)}>
                  Cancel
                </button>
                <button className="nav-cta" onClick={handleSave}>
                  Save Goals
                </button>
              </div>
            </div>
          </div>
        );
      };

      const SkipRestDayModal = () => {
        const warnings = [
          {
            title: "Rest Day is Important",
            message: "Recovery is when your muscles actually grow. Skipping rest increases injury risk.",
            icon: "⚠️",
            buttonText: "I understand, but skip anyway"
          },
          {
            title: "Your Body Needs This",
            message: "Overtraining leads to burnout, decreased performance, and potential injury. This is a 12-week program - pacing matters.",
            icon: "🚨",
            buttonText: "Skip anyway",
            cancelText: "I'll rest today"
          },
          {
            title: "Final Warning",
            message: "Okay, it's your call. But remember: rest days are PART of the system, not a break from it. If you skip, at least do light stretching and stay hydrated.",
            icon: "✋",
            buttonText: "Skip and unlock next workout",
            cancelText: "Actually, I'll rest"
          }
        ];

        const currentWarning = warnings[skipRestWarningLevel];

        const handleSkip = () => {
          if (skipRestWarningLevel < 2) {
            setSkipRestWarningLevel(skipRestWarningLevel + 1);
          } else {
            // Mark the rest day as skipped (add to completed days)
            const dayKey = `w${currentWeek}d${currentDay}`;
            
            setCompletedDays(prev => {
              if (!prev.includes(dayKey)) {
                return [...prev, dayKey];
              }
              return prev;
            });

            // Track as skipped in feedback
            const workoutKey = `week${currentWeek}_day${currentDay}`;
            setWorkoutFeedback(prev => ({
              ...prev,
              [workoutKey]: {
                feedback: 'skipped',
                date: new Date().toISOString(),
                week: currentWeek,
                day: currentDay
              }
            }));

            // Close modal first
            setShowSkipRestModal(false);
            setSkipRestWarningLevel(0);

            // Then handle day/week progression
            if (currentDay === 7) {
              // Last day of week - check for week progression
              if (currentWeek === 12) {
                // Last week completed - show celebration
                setTimeout(() => setScreen('completion'), 100);
              } else {
                // Move to next week, day 1
                setTimeout(() => {
                  setCurrentWeek(currentWeek + 1);
                  setCurrentDay(1);
                }, 100);
              }
            } else {
              // Move to next day within same week
              setTimeout(() => setCurrentDay(currentDay + 1), 100);
            }
          }
        };

        const handleCancel = () => {
          if (skipRestWarningLevel === 1) {
            // Second warning - cancel means rest
            setShowSkipRestModal(false);
            setSkipRestWarningLevel(0);
          } else if (skipRestWarningLevel === 2) {
            // Final warning - cancel means rest
            setShowSkipRestModal(false);
            setSkipRestWarningLevel(0);
          } else {
            // First warning - just close
            setShowSkipRestModal(false);
            setSkipRestWarningLevel(0);
          }
        };

        return (
          <div className="modal-overlay" onClick={handleCancel}>
            <div className="modal-content" onClick={(e) => e.stopPropagation()}>
              <div className="text-center mb-4">
                <div className="text-6xl mb-4">{currentWarning.icon}</div>
                <h2 className="text-2xl font-bold mb-2" style={{color: '#2C5F8D'}}>
                  {currentWarning.title}
                </h2>
              </div>

              <p className="text-gray-700 mb-6 text-center">
                {currentWarning.message}
              </p>

              <div className="space-y-3">
                {currentWarning.cancelText && (
                  <button 
                    className="nav-cta"
                    style={{background: '#2C5F8D', color: 'white', border: 'none'}}
                    onClick={handleCancel}
                  >
                    {currentWarning.cancelText}
                  </button>
                )}
                <button 
                  className={currentWarning.cancelText ? "btn-secondary" : "nav-cta"}
                  onClick={handleSkip}
                >
                  {currentWarning.buttonText}
                </button>
                {!currentWarning.cancelText && (
                  <button 
                    className="btn-secondary"
                    onClick={handleCancel}
                  >
                    Cancel
                  </button>
                )}
              </div>

              {skipRestWarningLevel > 0 && (
                <p className="text-xs text-center text-gray-500 mt-4">

        const skippedRestDays = Object.values(workoutFeedback).filter(f => f.feedback === 'skipped').length;
        const consistencyRate = Math.round((actualWorkouts / 64) * 100);
        const perfectWorkouts = Object.values(workoutFeedback).filter(f => f.feedback === 'perfect').length;
        const progressionWorkouts = Object.values(workoutFeedback).filter(f => f.feedback === 'easy').length;

        return (
          <div className="min-h-screen bg-gradient-to-b from-blue-50 to-white p-6">
            <div className="max-w-2xl mx-auto text-center">
              {/* Confetti effect */}
              {[...Array(20)].map((_, i) => (
                <div 
                  key={i} 
                  className="confetti"

      function WorkoutScreen() {
        // Exercise timer state (local to WorkoutScreen)
        const [exerciseTimeLeft, setExerciseTimeLeft] = useState(0);
        const [customTime, setCustomTime] = useState('');
        const [showTimeInput, setShowTimeInput] = useState(false);
        const [isTimerRunning, setIsTimerRunning] = useState(false);
        
        // Stopwatch state (actual time tracking)
        const [actualTimeElapsed, setActualTimeElapsed] = useState(0);
        const [isStopwatchRunning, setIsStopwatchRunning] = useState(false);
        const [showActualTimeInput, setShowActualTimeInput] = useState(false);
        const [actualTimeInput, setActualTimeInput] = useState('');
        
        const workoutInfo = getWorkoutInfo(currentDay, currentWeek);
        const exerciseDay = workoutInfo?.exerciseDay || 'day1';
        const dayExercises = exercises[exerciseDay] || exercises.day1;
        const exercise = dayExercises[currentExercise];
        const isLastExercise = currentExercise === dayExercises.length - 1;

        // Track previous exercise to prevent unnecessary resets
        const prevExerciseRef = React.useRef(null); // Start as null to detect first mount
        const isFirstMountRef = React.useRef(true);
        
        // Refs to store interval IDs for stable timer management
        const countdownIntervalRef = React.useRef(null);
        const stopwatchIntervalRef = React.useRef(null);
        
        // Refs to track running state without triggering re-renders
        const isTimerRunningRef = React.useRef(isTimerRunning);
        const isStopwatchRunningRef = React.useRef(isStopwatchRunning);
        
        // Sync refs with state
        React.useEffect(() => {
          isTimerRunningRef.current = isTimerRunning;
        }, [isTimerRunning]);
        
        React.useEffect(() => {
          isStopwatchRunningRef.current = isStopwatchRunning;
        }, [isStopwatchRunning]);

        // Parse exercise duration from "0:45" format to seconds
        const getDefaultDuration = () => {
          if (!exercise || !exercise.duration) {
            return 45;
          }
          try {
            const parts = exercise.duration.split(':');
            const mins = parseInt(parts[0]) || 0;
            const secs = parseInt(parts[1]) || 0;
            const total = mins * 60 + secs;
            return total > 0 ? total : 45;
          } catch (error) {
            return 45;
          }
        };

        // Initialize timers on first mount
        React.useEffect(() => {
          if (isFirstMountRef.current) {
            isFirstMountRef.current = false;
            prevExerciseRef.current = currentExercise;
            
            const defaultTime = getDefaultDuration();
            setExerciseTimeLeft(defaultTime);
            setActualTimeElapsed(0);
          }
        }, []); // Empty deps - runs once on mount

        // Initialize both timers when exercise ACTUALLY changes
        React.useEffect(() => {
          // Only reset if exercise actually changed
          if (prevExerciseRef.current !== currentExercise) {
            prevExerciseRef.current = currentExercise;
            
            const defaultTime = getDefaultDuration();
            
            // Reset display values
            setExerciseTimeLeft(defaultTime);
            setActualTimeElapsed(0);
            
            // Reset running states (state and refs)
            setIsTimerRunning(false);
            setIsStopwatchRunning(false);
            isTimerRunningRef.current = false;
            isStopwatchRunningRef.current = false;
            
            // Reset input states
            setShowTimeInput(false);
            setShowActualTimeInput(false);
            setCustomTime('');
            setActualTimeInput('');
          } else {
          }
        }, [currentExercise]);

        // Countdown timer logic - runs once, checks ref for running state
        React.useEffect(() => {
          
          const timer = setInterval(() => {
            // Check ref instead of state to avoid re-creating interval
            if (!isTimerRunningRef.current) return;
            
            setExerciseTimeLeft(prev => {
              if (prev <= 0) return 0;
              
              
              if (prev <= 1) {
                setIsTimerRunning(false);
                return 0;
              }
              return prev - 1;
            });
          }, 1000);
          
          // Store interval ID
          countdownIntervalRef.current = timer;

          // Only cleanup on unmount
          return () => {
            clearInterval(timer);
          };
        }, []); // Empty deps - only run once!

        // Stopwatch logic - runs once, checks ref for running state
        React.useEffect(() => {
          
          const timer = setInterval(() => {
            // Check ref instead of state to avoid re-creating interval
            if (!isStopwatchRunningRef.current) return;
            
            setActualTimeElapsed(prev => {
              return prev + 1;
            });
          }, 1000);
          
          // Store interval ID
          stopwatchIntervalRef.current = timer;

          // Only cleanup on unmount
          return () => {
            clearInterval(timer);
          };
        }, []); // Empty deps - only run once!

        // Format timer display
        const formatTime = (seconds) => {
          const mins = Math.floor(seconds / 60);
          const secs = seconds % 60;
          return `${mins}:${secs.toString().padStart(2, '0')}`;
        };

        // Handle custom planned time input
        const handleSetCustomTime = () => {
          const timeInSeconds = parseInt(customTime) || 45;
          setExerciseTimeLeft(timeInSeconds);
          setCustomTime('');
          setShowTimeInput(false);
          setIsTimerRunning(false);
          isTimerRunningRef.current = false;
        };

        // Start both timers together
        const handleStartBoth = () => {
          setIsTimerRunning(true);
          setIsStopwatchRunning(true);
          isTimerRunningRef.current = true;
          isStopwatchRunningRef.current = true;
        };

        // Pause both timers together
        const handlePauseBoth = () => {
          setIsTimerRunning(false);
          setIsStopwatchRunning(false);
          isTimerRunningRef.current = false;
          isStopwatchRunningRef.current = false;
        };

        // Reset both timers
        const handleResetBoth = () => {
          const defaultTime = getDefaultDuration();
          setExerciseTimeLeft(defaultTime);
          setActualTimeElapsed(0);
          setIsTimerRunning(false);
          setIsStopwatchRunning(false);
          isTimerRunningRef.current = false;
          isStopwatchRunningRef.current = false;
        };

        // Handle navigation to next exercise
        const handleNextExercise = () => {
          // Stop timers (state and refs)
          setIsTimerRunning(false);
          setIsStopwatchRunning(false);
          isTimerRunningRef.current = false;
          isStopwatchRunningRef.current = false;
          
          // Always show modal to confirm actual time if stopwatch was used
          if (actualTimeElapsed > 0) {
            setShowActualTimeInput(true);
            setActualTimeInput(actualTimeElapsed.toString());
          } else {
            // If stopwatch wasn't used, ask if they want to input time manually
            const useStopwatch = confirm('You didn\'t use the stopwatch. Would you like to input the actual time spent on this exercise?');
            if (useStopwatch) {
              setShowActualTimeInput(true);
              setActualTimeInput('');
            } else {
              proceedToNext(null);
            }
          }
        };

        // Proceed to next exercise after confirming time
        const proceedToNext = (confirmedTime = null) => {
          // Store actual time with exercise data
          if (confirmedTime !== null) {
            const exerciseKey = `${exercise.name}_ex${currentExercise}`;
            // Store in localStorage or state for tracking
            const actualTimes = JSON.parse(localStorage.getItem('actualExerciseTimes') || '{}');
            const workoutKey = `week${currentWeek}_day${currentDay}`;
            
            if (!actualTimes[workoutKey]) {
              actualTimes[workoutKey] = {};
            }
            
            actualTimes[workoutKey][exerciseKey] = {
              exerciseName: exercise.name,
              plannedTime: getDefaultDuration(),
              actualTime: confirmedTime,
              timestamp: new Date().toISOString()
            };
            
            localStorage.setItem('actualExerciseTimes', JSON.stringify(actualTimes));
          }
          
          if (isLastExercise) {
            setScreen('complete');
          } else {
            setCurrentExercise(currentExercise + 1);
          }
        };

        const handlePreviousExercise = () => {
          if (currentExercise > 0) {
            setCurrentExercise(currentExercise - 1);
          }
        };

        // Confirm actual time from modal
        const handleConfirmActualTime = () => {
          const finalTime = parseInt(actualTimeInput) || actualTimeElapsed;
          setShowActualTimeInput(false);
          proceedToNext(finalTime);
        };

        return (
          <div className="min-h-screen text-white" style={{background: '#1A1A1A'}}>
            <button onClick={() => setScreen('home')} className="absolute top-6 left-6 text-3xl z-10">×</button>
            
            {/* Exercise Demo */}
            <div className="h-96 flex items-center justify-center text-8xl" style={{background: '#0a0a0a'}}>
              {exercise.image}
            </div>

            {/* Exercise Info */}
            <div className="p-6">
              <div className="dev-badge mb-3" style={{background: '#252525', color: '#fb923c'}}>
                Exercise {currentExercise + 1} of {dayExercises.length}
              </div>
              <h2 className="text-2xl font-bold mb-2">{exercise.name}</h2>
              <p className="text-gray-400 mb-4">{exercise.sets}</p>

              {/* Dual Timer Section */}
              <div className="grid grid-cols-2 gap-4 mb-4">
                {/* Countdown Timer (Planned) */}
                <div className="rounded-lg p-4 text-center" style={{background: '#252525'}}>
                  <div className="text-xs text-gray-400 mb-2">PLANNED TIME</div>
                  <div 
                    className={`text-4xl font-bold mb-2 ${isTimerRunning ? 'timer-running' : ''}`}
                    style={{color: exerciseTimeLeft === 0 ? '#22c55e' : '#fb923c'}}
                    key={exerciseTimeLeft}
                  >
                    {formatTime(exerciseTimeLeft)}
                  </div>
                  <div className="text-xs text-gray-400 mb-1">Countdown</div>
                  <div className="text-xs text-gray-500">{isTimerRunning ? '⏵ Running' : '⏸ Paused'}</div>
                  
                  {/* Individual countdown controls */}
                  <div className="flex gap-1">
                    <button
                      className="flex-1 py-1 px-2 rounded text-xs font-semibold"
                      style={{background: isTimerRunning ? '#ef4444' : '#22c55e', color: 'white'}}
                      onClick={() => {
                        const newState = !isTimerRunning;
                        setIsTimerRunning(newState);
                        isTimerRunningRef.current = newState;
                      }}
                      disabled={exerciseTimeLeft === 0}
                    >
                      {isTimerRunning ? '⏸' : '▶'}
                    </button>
                    <button
                      className="flex-1 py-1 px-2 rounded text-xs font-semibold"
                      style={{background: '#374151', color: 'white'}}
                      onClick={() => {
                        const defaultTime = getDefaultDuration();
                        setExerciseTimeLeft(defaultTime);
                        setIsTimerRunning(false);
                        isTimerRunningRef.current = false;
                      }}
                    >
                      🔄
                    </button>
                  </div>
                </div>

                {/* Stopwatch (Actual) */}
                <div className="rounded-lg p-4 text-center" style={{background: '#252525'}}>
                  <div className="text-xs text-gray-400 mb-2">ACTUAL TIME</div>
                  <div 
                    className={`text-4xl font-bold mb-2 ${isStopwatchRunning ? 'timer-running' : ''}`}
                    style={{color: '#3b82f6'}}
                    key={actualTimeElapsed}
                  >
                    {formatTime(actualTimeElapsed)}
                  </div>
                  <div className="text-xs text-gray-400 mb-1">Stopwatch</div>
                  <div className="text-xs text-gray-500">{isStopwatchRunning ? '⏵ Running' : '⏸ Paused'}</div>
                  
                  {/* Individual stopwatch controls */}
                  <div className="flex gap-1">
                    <button
                      className="flex-1 py-1 px-2 rounded text-xs font-semibold"
                      style={{background: isStopwatchRunning ? '#ef4444' : '#22c55e', color: 'white'}}
                      onClick={() => {
                        const newState = !isStopwatchRunning;
                        setIsStopwatchRunning(newState);
                        isStopwatchRunningRef.current = newState;
                      }}
                    >
                      {isStopwatchRunning ? '⏸' : '▶'}
                    </button>
                    <button
                      className="flex-1 py-1 px-2 rounded text-xs font-semibold"
                      style={{background: '#374151', color: 'white'}}
                      onClick={() => {
                        setActualTimeElapsed(0);
                        setIsStopwatchRunning(false);
                        isStopwatchRunningRef.current = false;
                      }}
                    >
                      🔄
                    </button>
                  </div>
                </div>
              </div>

              {/* Synced Timer Controls */}
              <div className="rounded-lg p-4 mb-6" style={{background: '#252525'}}>
                <div className="text-xs text-gray-400 text-center mb-3">SYNCHRONIZED CONTROLS</div>
                
                {exerciseTimeLeft === 0 && actualTimeElapsed > 0 && (
                  <div className="text-green-400 font-semibold mb-3 text-sm text-center">
                    ✓ Planned time complete! Actual time: {formatTime(actualTimeElapsed)}
                  </div>
                )}
                
                <div className="flex gap-3 mb-3">
                  <button 
                    className="flex-1 py-3 px-4 rounded-lg font-semibold"
                    style={{
                      background: (isTimerRunning || isStopwatchRunning) ? '#ef4444' : '#22c55e',

                    onClick={() => {
                      if (isTimerRunning || isStopwatchRunning) {
                        handlePauseBoth();
                      } else {
                        handleStartBoth();
                      }
                    }}
                  >
                    {(isTimerRunning || isStopwatchRunning) ? '⏸ Pause Both' : '▶ Start Both'}
                  </button>
                  <button 
                    className="flex-1 py-3 px-4 rounded-lg font-semibold"
                    style={{background: '#374151', color: 'white'}}
                    onClick={handleResetBoth}
                  >
                    🔄 Reset Both
                  </button>
                </div>

                {/* Custom Planned Time Input */}
                {!showTimeInput ? (
                  <button 
                    className="text-sm text-gray-400 underline w-full"
                    onClick={() => setShowTimeInput(true)}
                  >
                    Set custom planned time
                  </button>
                ) : (
                  <div className="flex gap-2 items-center justify-center">
                    <input 
                      type="number"
                      placeholder="Seconds"
                      value={customTime}
                      onChange={(e) => setCustomTime(e.target.value)}
                      className="w-24 px-3 py-2 rounded-lg text-black text-center"
                      style={{background: 'white'}}
                    />
                    <button

                    <button

                      style={{background: '#374151', color: 'white'}}

              {/* Instructions */}

                    <li key={idx}>• {instruction}</li>
                  ))}

              {/* Common Mistakes */}
              {exercise.mistakes && (
                <div className="rounded-lg p-4 mb-6" style={{background: '#252525'}}>
                  <h3 className="font-bold mb-3 text-red-400">AVOID THESE MISTAKES:</h3>
                  <ul className="space-y-1 text-sm text-gray-300">
                    {exercise.mistakes.map((mistake, idx) => (
                      <li key={idx}>✗ {mistake}</li>
                    ))}
                  </ul>
                </div>

              {/* Navigation */}
              <div className="flex gap-3">
                <button 
                  className="btn-secondary flex-1"
                  onClick={handlePreviousExercise}
                  disabled={currentExercise === 0}
                  style={currentExercise === 0 ? {opacity: 0.5} : {}}

                  ← Previous

                <button

              {/* Progress indicator */}

                  <div className="progress-fill" style={{ width: `${((currentExercise + 1) / dayExercises.length) * 100}%` }}></div>

              <div className="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50 p-6">
                <div className="bg-white rounded-lg p-6 max-w-md w-full">
                  <h3 className="text-xl font-bold mb-4" style={{color: '#2C5F8D'}}>
                    Exercise Complete!

                  <div className="mb-4">

                      <div className="bg-blue-50 p-3 rounded-lg">

                      weight: w,
                      date: new Date().toISOString(),
                      week: currentWeek,
                      day: currentDay
                    }];
                  }
                });
                setExerciseWeights(updated);
                handleWorkoutComplete(selectedFeedback);

            const trend = delta > 0 ? '↑' : delta < 0 ? '↓' : '→';
            const trendColor = delta > 0 ? '#22c55e' : delta < 0 ? '#ef4444' : '#a3a3a3';
            return { name, history: sorted, first, last, delta, trend, trendColor };

      function ProfileScreen() {
        // Real streak: consecutive calendar days with at least one completed workout
        const calculateStreak = () => {
          const completed = Object.values(workoutFeedback).filter(f => f.feedback !== 'skipped' && f.date);
          if (completed.length === 0) return 0;

          // Unique calendar dates, sorted newest first
          const dates = [...new Set(completed.map(f => f.date.split('T')[0]))].sort().reverse();

          const today     = new Date().toISOString().split('T')[0];
          const yesterday = new Date(Date.now() - 86400000).toISOString().split('T')[0];

          // Streak must include today or yesterday
          if (dates[0] !== today && dates[0] !== yesterday) return 0;

          let streak = 1;
          for (let i = 1; i < dates.length; i++) {
            const diff = Math.round(
              (new Date(dates[i - 1]) - new Date(dates[i])) / 86400000
            );
            if (diff === 1) streak++;
            else break;
          }
          return streak;
        };

        const currentStreak = calculateStreak();
        const perfectWorkouts = Object.values(workoutFeedback).filter(f => f.feedback === 'perfect').length;

        // Calculate weight to display
        const displayWeight = (weight) => {
          if (!weight) return '';
          if (settings.units === 'kg') {
            return `${Math.round(weight * 0.453592)} kg`;

          return `${weight} lbs`;

        return (
          <div className="min-h-screen pb-6">

      function SettingsScreen() {

        const handleSaveSettings = () => {
          setSettings(localSettings);
          setSuccess('Settings saved!');
          setTimeout(() => {
            setSuccess('');
            setScreen('more');
          }, 1500);
        };

        const handlePasswordChange = () => {
          setPasswordError('');
          setPasswordSuccess('');

          if (!currentPassword || !newPassword || !confirmNewPassword) {
            setPasswordError('All fields required');
            return;
          }

          if (newPassword.length < 6) {
            setPasswordError('New password must be at least 6 characters');
            return;
          }

          if (newPassword !== confirmNewPassword) {
            setPasswordError('New passwords do not match');
            return;
          }

          // Get user and verify current password
          const users = JSON.parse(localStorage.getItem('devDadUsers') || '[]');
          const userIndex = users.findIndex(u => u.email === currentUser.email);

          if (userIndex === -1 || users[userIndex].password !== currentPassword) {
            setPasswordError('Current password is incorrect');
            return;
          }

          // Update password
          users[userIndex].password = newPassword;
          localStorage.setItem('devDadUsers', JSON.stringify(users));

          setPasswordSuccess('Password changed successfully!');
          setCurrentPassword('');
          setNewPassword('');
          setConfirmNewPassword('');
          
          setTimeout(() => {
            setShowPasswordChange(false);
            setPasswordSuccess('');

              <div className="bg-white p-6 border-b border-gray-200">
                <div className="flex items-center gap-3">
                  <button onClick={() => setScreen('home')} className="text-2xl">←</button>
                  <h1 className="text-2xl font-bold" style={{color: '#2C5F8D'}}>Exercise Details</h1>
                </div>
              </div>
              <div className="p-6">
                <div className="card text-center py-8">
                  <div className="text-5xl mb-3">❌</div>
                  <div className="font-semibold mb-1">No exercise selected</div>
                </div>
              </div>
            </div>
          );
        }

        return (
          <div className="min-h-screen pb-6">
            <div className="bg-white p-6 border-b border-gray-200">
              <div className="flex items-center gap-3">
                <button onClick={() => setScreen('home')} className="text-2xl">←</button>
                <h1 className="text-2xl font-bold" style={{color: '#2C5F8D'}}>Exercise Details</h1>
              </div>
            </div>

            <div className="p-6">
              {/* Exercise Header */}
              <div className="card mb-6 text-center">
                <div className="text-6xl mb-4">{selectedExercise.image}</div>
                <h2 className="text-2xl font-bold mb-2">{selectedExercise.name}</h2>
                <div className="dev-badge">{selectedExercise.sets}</div>
              </div>

              {/* Instructions */}
              {selectedExercise.instructions && selectedExercise.instructions.length > 0 && (
                <>
                  <div className="section-label">HOW TO PERFORM</div>
                  <div className="card mb-6">
                    <div className="space-y-3">
                      {selectedExercise.instructions.map((instruction, idx) => (
                        <div key={idx} className="flex gap-3">
                          <div className="w-8 h-8 rounded-full flex items-center justify-center flex-shrink-0 font-bold text-sm" style={{background: '#E8F0F7', color: '#2C5F8D'}}>
                            {idx + 1}
                          </div>
                          <div className="flex-1 pt-1">
                            <p className="text-gray-700">{instruction}</p>
                          </div>
                        </div>
                      ))}
                    </div>
                  </div>
                </>
              )}

              {/* Common Mistakes */}
              {selectedExercise.mistakes && selectedExercise.mistakes.length > 0 && (
                <>
                  <div className="section-label">AVOID THESE MISTAKES</div>
                  <div className="card mb-6">
                    {selectedExercise.mistakes.map((mistake, idx) => (
                      <div key={idx} className="flex gap-3 mb-3 last:mb-0">
                        <span className="text-red-500 text-lg">✗</span>
                        <p className="text-gray-700 flex-1">{mistake}</p>
                      </div>
                    ))}
                  </div>
                </>
              )}

              {/* Action Buttons */}
              <div className="space-y-3">
                <button 
                  className="nav-cta"
                  onClick={() => {
                    setScreen('workout');
                    setWorkoutStarted(true);
                    // Find this exercise's index in current day exercises
                    const workoutInfo = getWorkoutInfo(currentDay, currentWeek);
                    const currentDayExercises = workoutInfo ? exercises[workoutInfo.exerciseDay] || exercises.day1 : exercises.day1;
                    const exerciseIndex = currentDayExercises.findIndex(ex => ex.id === selectedExercise.id);
                    setCurrentExercise(exerciseIndex >= 0 ? exerciseIndex : 0);
                  }}
                >
                  Start This Exercise
                </button>
                
                <button 
                  className="btn-secondary"
                  onClick={() => setScreen('home')}
                >
                  Back to Workout List
                </button>
              </div>
            </div>
          </div>
        );
      }
    }

    ReactDOM.render(<App />, document.getElementById('root'));
  </script>
</body>
</html>
