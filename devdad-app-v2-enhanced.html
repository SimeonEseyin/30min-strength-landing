      function SettingsScreen() {
        const [localSettings, setLocalSettings] = useState(settings);
        const [showPasswordChange, setShowPasswordChange] = useState(false);
        const [currentPassword, setCurrentPassword] = useState('');
        const [newPassword, setNewPassword] = useState('');
        const [confirmNewPassword, setConfirmNewPassword] = useState('');
        const [passwordError, setPasswordError] = useState('');
        const [passwordSuccess, setPasswordSuccess] = useState('');
        const [settingsError, setSettingsError] = useState('');

        useEffect(() => {
          setLocalSettings(settings);
        }, [settings]);

        const handleSaveSettings = async () => {
          setSettingsError('');
          const nextSettings = normalizeSettingsDraft(localSettings);
          let pushStatus = null;

          if (nextSettings.notificationEnabled) {
            const permission = await requestNotificationPermission();
            if (permission !== 'granted') {
              setSettingsError('Enable browser notifications before turning on daily reminders.');
              return;
            }

            try {
              pushStatus = await syncPushSubscription(nextSettings);
            } catch (error) {
              setSettingsError('Could not register this device for push reminders.');
              return;
            }
          } else {
            try {
              await removePushSubscription();
            } catch (error) {
            }
          }

          try {
            await persistUserData({
              progress: {
                currentWeek,
                currentDay,
                completedDays,
                workoutFeedback,
                lastWorkoutStartedAt,
                goals,
                currentCycleNumber,
                lastUpdated: new Date().toISOString()
              },
              history: programHistory,
              settings: nextSettings,
              profile: userProfile,
              weights: exerciseWeights,
              coachCache: {
                coach: aiCoach,
                snapshot: lastAiSnapshot.current,
                updatedAt: aiCoach ? new Date().toISOString() : null
              },
              planConfig,
              intake: onboardingIntake
            });
          } catch (error) {
            setSettingsError(error.message || 'Could not save settings right now.');
            return;
          }

          setSettings(nextSettings);
          if (nextSettings.notificationEnabled && pushStatus && !pushStatus.configured) {
            setSuccess('Settings saved.');
            setSettingsError('Closed-app push reminders need server VAPID keys.');
          } else {
            setSuccess(nextSettings.notificationEnabled ? 'Settings saved. Push reminders enabled for this device.' : 'Settings saved!');
          }
          setTimeout(() => {
            setSuccess('');
          }, 1500);
        };

        const handleEnableNotifications = async () => {
          setSettingsError('');
          const permission = await requestNotificationPermission();

          if (permission === 'granted') {
            setLocalSettings(prev => ({
              ...prev,
              notificationEnabled: true
            }));
            setSuccess('Browser notifications enabled.');
            setTimeout(() => setSuccess(''), 1800);
            return;
          }

          if (permission === 'denied') {
            setSettingsError('Notifications are blocked in this browser. Allow them in browser settings to enable reminders.');
            return;
          }

          setSettingsError('Notification permission was dismissed.');
        };

        const handleSendTestReminder = async () => {
          setSettingsError('');

          if (notificationPermission !== 'granted') {
            const permission = await requestNotificationPermission();
            if (permission !== 'granted') {
              setSettingsError('Enable browser notifications first, then send a test reminder.');
              return;
            }
          }

          let pushStatus = null;
          try {
            pushStatus = await syncPushSubscription(normalizeSettingsDraft(localSettings));
          } catch (error) {
            setSettingsError('Could not sync this device for push testing.');
            return;
          }

          if (pushStatus?.configured) {
            try {
              await apiRequest('/.netlify/functions/send-test-push', {
                method: 'POST',
                body: JSON.stringify({})
              });
              setSuccess('Server push test sent. Close the app and verify it arrives.');
              setTimeout(() => setSuccess(''), 2200);
              return;
            } catch (error) {
              setSettingsError(error.message || 'The server could not deliver a push test.');
              return;
            }
          }

          const delivered = await deliverWorkoutReminder({ isTest: true });
          if (delivered) {
            setSuccess('Local test reminder sent. Server push is not configured yet.');
            setTimeout(() => setSuccess(''), 2200);
            return;
          }

          setSettingsError('Could not send a test reminder on this device.');
        };

        const handlePasswordChange = async () => {
          setPasswordError('');
          setPasswordSuccess('');

          if (!currentPassword || !newPassword || !confirmNewPassword) {
            setPasswordError('All fields required');
            return;
          }

          const passwordValidation = validatePassword(newPassword);
          if (passwordValidation) {
            setPasswordError(passwordValidation);
            return;
          }

          if (newPassword !== confirmNewPassword) {
            setPasswordError('New passwords do not match');
            return;
          }

          try {
            const result = await apiRequest('/.netlify/functions/change-password', {
              method: 'POST',
              body: JSON.stringify({
                currentPassword,
                newPassword,
                confirmNewPassword
              })
            });

            setPasswordSuccess(result.message || 'Password changed successfully!');
            setCurrentPassword('');
            setNewPassword('');
            setConfirmNewPassword('');

            setTimeout(() => {
              setShowPasswordChange(false);
              setPasswordSuccess('');
            }, 2000);
          } catch (error) {
            setPasswordError(error.message || 'Could not change password');
          }
        };

        return (
          <div className="app-screen">
            <SubpageHeader title="Settings" subtitle="Units, reminders, security, and system preferences." onBack={() => setScreen('more')} />

            <div className="p-6">
              {success && <div className="success-box">{success}</div>}
              {settingsError && <div className="error-box">{settingsError}</div>}

              {/* Units */}
              <div className="section-label text-orange-400">UNITS</div>
              <div className="card mb-6">
                <div className="font-semibold mb-3 text-gray-400">Weight & Height Units</div>
                <div className="flex gap-3 text-sm">
                  <button
                    className={`flex-1 py-3 px-4 rounded-lg font-semibold ${localSettings.units === 'lbs' ? 'text-white' : ''}`}
                    style={localSettings.units === 'lbs' ? {background: 'linear-gradient(135deg, #f97316 0%, #ea580c 100%)'} : {background:'rgba(255,255,255,0.04)', color:'#d4d4d4', border:'1px solid rgba(255,255,255,0.08)'}}
                    onClick={() => setLocalSettings({...localSettings, units: 'lbs'})}
                  >
                    LBS / IN
                  </button>
                  <button
                    className={`flex-1 py-3 px-4 rounded-lg font-semibold ${localSettings.units === 'kg' ? 'text-white' : ''}`}
                    style={localSettings.units === 'kg' ? {background: 'linear-gradient(135deg, #f97316 0%, #ea580c 100%)'} : {background:'rgba(255,255,255,0.04)', color:'#d4d4d4', border:'1px solid rgba(255,255,255,0.08)'}}
                    onClick={() => setLocalSettings({...localSettings, units: 'kg'})}
                  >
                    KG / CM
                  </button>
                </div>
              </div>

              {/* Notifications */}
              <div className="section-label">NOTIFICATIONS</div>
              <div className="card mb-6">
                <div className="flex items-start justify-between gap-4 mb-3">
                  <div>
                    <div className="font-semibold">Daily Workout Reminder</div>
                    <div className="text-xs text-gray-500 mt-1">
                      {notificationPermission === 'unsupported'
                        ? 'This browser does not support notifications for the app.'
                        : notificationPermission === 'denied'
                          ? 'Notifications are blocked in this browser.'
                          : notificationPermission === 'granted'
                            ? 'Browser notifications are enabled for this device.'
                            : 'Enable browser notifications to receive reminders.'}
                    </div>
                  </div>
                  <button
                    className={`w-14 h-8 rounded-full transition-colors ${
                      localSettings.notificationEnabled ? 'bg-green-500' : 'bg-gray-300'
                    }`}
                    onClick={() => {
                      setSettingsError('');
                      setLocalSettings({
                        ...localSettings,
                        notificationEnabled: !localSettings.notificationEnabled
                      });
                    }}
                    disabled={notificationPermission === 'unsupported'}
                    style={notificationPermission === 'unsupported' ? {opacity: 0.45} : {}}
                  >
                    <div className={`w-6 h-6 bg-white rounded-full transform transition-transform ${
                      localSettings.notificationEnabled ? 'translate-x-7' : 'translate-x-1'
                    }`} style={{marginTop: '4px'}}></div>
                  </button>
                </div>
                <input
                  type="time"
                  value={localSettings.notificationTime}
                  onChange={(e) => setLocalSettings({
                    ...localSettings,
                    notificationTime: e.target.value,
                    notificationTimezone: getBrowserTimeZone()
                  })}
                  className="w-full"
                  disabled={!localSettings.notificationEnabled || notificationPermission === 'unsupported'}
                  style={!localSettings.notificationEnabled || notificationPermission === 'unsupported' ? {opacity: 0.55} : {}}
                />
                <div className="text-xs text-gray-500 mt-2">Closed-app reminders use push when supported. This device is currently using {getBrowserTimeZone()}.</div>
                <div className="flex gap-3 mt-4 text-xs">
                  {notificationPermission !== 'granted' && (
                    <button
                      className="btn-secondary flex-1"
                      onClick={handleEnableNotifications}
                      disabled={notificationPermission === 'unsupported'}
                      style={notificationPermission === 'unsupported' ? {opacity: 0.45} : {}}
                    >
                      Enable Browser Notifications
                    </button>
                  )}
                  {showNotificationDebugTools && (
                    <button
                      className="btn-secondary flex-1"
                      onClick={handleSendTestReminder}
                      disabled={notificationPermission === 'unsupported'}
                      style={notificationPermission === 'unsupported' ? {opacity: 0.45} : {}}
                    >
                      Send Push Test
                    </button>
                  )}
                </div>
              </div>

              {/* Password Change */}
              <div className="section-label text-orange-400">SECURITY</div>
              {!showPasswordChange ? (
                <button
                  className="surface-row"
                  onClick={() => setShowPasswordChange(true)}
                >
                  <div className="flex items-center gap-3">
                    <span className="text-xl">🔒</span>
                    <span className="font-semibold">Change Password</span>
                  </div>
                  <span className="text-gray-400">›</span>
                </button>
              ) : (
                <div className="card mb-6">
                  <h3 className="font-bold mb-4 text-gray-400">Change Password</h3>
                  
                  {passwordError && <div className="error-box">{passwordError}</div>}
                  {passwordSuccess && <div className="success-box">{passwordSuccess}</div>}

                  <div className="space-y-3 text-sm">
                    <input
                      type="password"
                      placeholder="Current Password"
                      value={currentPassword}
                      onChange={(e) => setCurrentPassword(e.target.value)}
                    />
                    <input
                      type="password"
                      placeholder="New Password (min 8 characters, uppercase, lowercase, number)"
                      value={newPassword}
                      onChange={(e) => setNewPassword(e.target.value)}
                    />
                    <input
                      type="password"
                      placeholder="Confirm New Password"
                      value={confirmNewPassword}
                      onChange={(e) => setConfirmNewPassword(e.target.value)}
                    />
                  </div>

                  <div className="flex gap-3 mt-4 text-xs">
                    <button
                      className="btn-secondary flex-1"
                      onClick={() => {
                        setShowPasswordChange(false);
                        setCurrentPassword('');
                        setNewPassword('');
                        setConfirmNewPassword('');
                        setPasswordError('');
                      }}
                    >
                      Cancel
                    </button>
                    <button className="nav-cta flex-1" onClick={handlePasswordChange}>
                      Update
                    </button>
                  </div>
                </div>
              )}

              {/* Save Button */}
              <button className="nav-cta" onClick={handleSaveSettings}>
                Save Settings
              </button>
            </div>
          </div>
        );
      }

      function HelpCenterScreen() {

          },

        return (
          <div className="app-screen">
            <SubpageHeader title="Help Center" subtitle="Support, FAQs, and resources for the full system." onBack={() => setScreen('more')} />

            <div className="p-6">
              {/* Quick Help */}
              <div className="card hero-card mb-6">
                <div className="flex items-center gap-3 mb-2">
                  <span className="text-2xl">💬</span>
                  <div className="font-bold text-orange-300">Need help?</div>
                </div>
                <p className="text-sm text-gray-300 mb-3">
                  Email us at <a href="mailto:devdad.desk@gmail.com" className="font-semibold text-orange-300">devdad.desk@gmail.com</a>
                </p>
                <p className="text-xs text-gray-500">We usually respond within a couple of business days.</p>
              </div>

              {/* FAQs */}
              <div className="section-label text-orange-400">FREQUENTLY ASKED QUESTIONS</div>
              <div className="space-y-3 mb-6">
                {faqs.map((faq, idx) => (
                  <div key={idx} className="card">
                    <button
                      className="w-full text-left flex items-start justify-between gap-3"
                      onClick={() => setExpandedFaq(expandedFaq === idx ? null : idx)}
                    >
                      <div className="font-semibold flex-1 text-gray-300">{faq.q}</div>
                      <span className="text-xl text-gray-500">{expandedFaq === idx ? '−' : '+'}</span>
                    </button>
                    {expandedFaq === idx && (
                      <div className="mt-3 pt-3 text-sm text-gray-400" style={{borderTop:'1px solid rgba(255,255,255,0.06)'}}>
                        {faq.a}
                      </div>
                    )}
                  </div>
                ))}
              </div>

              {/* Resources */}
              <div className="section-label text-orange-400">RESOURCES</div>
              <a className="surface-row" href="/exercise-library.html" target="_blank" rel="noreferrer">
                <div className="flex items-center gap-3">
                  <span className="text-xl">📹</span>
                  <span className="font-semibold">Exercise Video Library</span>
                </div>
                <span className="text-gray-400">›</span>
              </a>

              <a className="surface-row" href="/program-guide.html" target="_blank" rel="noreferrer">
                <div className="flex items-center gap-3">
                  <span className="text-xl">📄</span>
                  <span className="font-semibold">Program PDF Guide</span>
                </div>
                <span className="text-gray-400">›</span>
              </a>

              <a className="surface-row" href="/founding-member-updates.html" target="_blank" rel="noreferrer">
                <div className="flex items-center gap-3">
                  <span className="text-xl">✉️</span>
                  <span className="font-semibold">Founding Member Updates</span>
                </div>
                <span className="text-gray-400">›</span>

              {/* About */}
              <div className="section-label text-orange-400">ABOUT</div>
              <div className="card">
                <div className="font-bold mb-2 text-orange-300">The 30-Minute Strength System</div>
                <p className="text-sm text-gray-300 mb-2">Version 1.0</p>
                <p className="text-xs text-gray-500">
                  Built by Simeon, an engineer dad who rebuilt his strength while raising twins, for dads who want a more structured way to train.
                </p>
              </div>
            </div>
          </div>
        );
      }

      function WeightTrackingScreen() {
        const [showWeightInput, setShowWeightInput] = useState(false);
        const [newWeight, setNewWeight] = useState('');
        const [newHeight, setNewHeight] = useState(userProfile.height || '');

        const handleLogWeight = () => {
          if (!newWeight) return;

          const weightValue = parseFloat(newWeight);
          const newEntry = {
            date: new Date().toISOString(),
            weight: weightValue
          };

          setUserProfile({
            ...userProfile,
            currentWeight: weightValue,
            weightHistory: [...userProfile.weightHistory, newEntry]
          });

          setNewWeight('');
          setShowWeightInput(false);
          setSuccess('Weight logged!');
          setTimeout(() => setSuccess(''), 2000);
        };

        const handleSaveHeight = () => {
          if (!newHeight) return;

          setUserProfile({
            ...userProfile,
            height: newHeight
          });

          setSuccess('Height saved!');
          setTimeout(() => setSuccess(''), 2000);
        };

        const displayWeight = (weight) => {
          if (settings.units === 'kg') {
            return `${Math.round(weight * 0.453592)} kg`;
          }
          return `${weight} lbs`;
        };

        // Get last 7 weight entries
        const recentWeights = userProfile.weightHistory.slice(-7).reverse();

        // Calculate weight change
        const weightChange = userProfile.weightHistory.length >= 2
          ? userProfile.weightHistory[userProfile.weightHistory.length - 1].weight - userProfile.weightHistory[0].weight
          : 0;

        return (
          <div className="app-screen">
            <SubpageHeader title="Body Tracking" subtitle="Weight history, trend, and target progress." onBack={() => setScreen('profile')} />

            <div className="p-6">
              {success && <div className="success-box">{success}</div>}

              {/* Current Stats */}
              <div className="grid grid-cols-2 gap-4 mb-6">
                <div className="card metric-card text-center">
                  <div className="text-sm text-gray-500 mb-1">Current Weight</div>
                  <div className="text-2xl font-bold text-white">
                    {userProfile.currentWeight ? displayWeight(userProfile.currentWeight) : '—'}
                  </div>
                </div>
                <div className="card metric-card text-center">
                  <div className="text-sm text-gray-500 mb-1">Total Change</div>
                  <div className={`text-2xl font-bold ${weightChange > 0 ? 'text-orange-500' : weightChange < 0 ? 'text-green-500' : ''}`}>
                    {weightChange !== 0 ? (weightChange > 0 ? '+' : '') + displayWeight(Math.abs(weightChange)) : '—'}
                  </div>
                </div>
              </div>

              {/* Goal */}
              {goals.targetWeight && (
                <div className="card hero-card mb-6">
                  <div className="flex items-center justify-between">
                    <div>
                      <div className="text-sm text-gray-500">Target Weight</div>
                      <div className="font-bold text-lg">{displayWeight(goals.targetWeight)}</div>
                    </div>
                    {userProfile.currentWeight && (
                      <div className="text-right">
                          <div className="text-sm text-gray-500">To Go</div>
                        <div className="font-bold">
                          {Math.abs(userProfile.currentWeight - parseFloat(goals.targetWeight)).toFixed(1)} {settings.units}
                        </div>
                      </div>
                    )}
                  </div>
                </div>
              )}

              {/* Log Weight Button */}
              {!showWeightInput ? (
                <button
                  className="nav-cta mb-6"
                  onClick={() => setShowWeightInput(true)}
                >
                  📊 Log Weight Today
                </button>
              ) : (
                <div className="card mb-6">
                  <h3 className="font-bold mb-3">Log Your Weight</h3>
                  <div className="flex gap-3 items-end">
                    <div className="flex-1">
                      <input
                        type="number"
                        placeholder={settings.units === 'kg' ? 'Weight (kg)' : 'Weight (lbs)'}
                        value={newWeight}
                        onChange={(e) => setNewWeight(e.target.value)}
                        step="0.1"
                      />
                    </div>
                    <button className="nav-cta" onClick={handleLogWeight} style={{width: 'auto', padding: '16px 24px'}}>
                      Save
                    </button>
                    <button
                      className="btn-secondary"
                      onClick={() => {
                        setShowWeightInput(false);
                        setNewWeight('');
                      }}
                      style={{width: 'auto', padding: '16px 24px'}}
                    >
                      Cancel
                    </button>
                  </div>
                </div>
              )}

              {/* Height */}
              <div className="section-label">HEIGHT</div>
              <div className="card mb-6">
                <div className="font-semibold mb-3">Your Height</div>
                <div className="flex gap-3 items-end">
                  <div className="flex-1">
                    <input
                      type="number"
                      placeholder={settings.units === 'kg' ? 'Height (cm)' : 'Height (inches)'}
                      value={newHeight}
                      onChange={(e) => setNewHeight(e.target.value)}
                    />
                  </div>
                  <button className="nav-cta" onClick={handleSaveHeight} style={{width: 'auto', padding: '16px 24px'}}>
                    Save
                  </button>
                </div>
              </div>

              {/* Weight History */}
              <div className="section-label">RECENT HISTORY</div>
              {recentWeights.length === 0 ? (
                <div className="card text-center py-8">
                  <div className="text-5xl mb-3">⚖️</div>
                  <div className="font-semibold mb-1">No weight data yet</div>
                  <div className="text-sm text-gray-500">Log your first weight to start tracking</div>
                </div>
              ) : (
                <div className="space-y-2">
                  {recentWeights.map((entry, idx) => {
                    const date = new Date(entry.date);
                    const formattedDate = date.toLocaleDateString('en-US', {
                      month: 'short',
                      day: 'numeric',
                      year: 'numeric'
                    });

                    return (
                      <div key={idx} className="card flex items-center justify-between">
                        <div>
                          <div className="font-semibold text-white">{displayWeight(entry.weight)}</div>
                          <div className="text-xs text-gray-500">{formattedDate}</div>
                        </div>
                        {idx < recentWeights.length - 1 && (
                          <div className={`text-sm font-semibold ${
                            entry.weight < recentWeights[idx + 1].weight ? 'text-green-500' : 'text-orange-500'
                          }`}>
                            {entry.weight < recentWeights[idx + 1].weight ? '↓' : '↑'} 
                            {Math.abs(entry.weight - recentWeights[idx + 1].weight).toFixed(1)} {settings.units}
                          </div>
                        )}
                      </div>
                    );
                  })}
                </div>
              )}
            </div>
          </div>
        );
      }

      function ExerciseDetailScreen() {
        const returnScreen = detailReturnScreen || (workoutStarted ? 'workout' : 'home');

        if (!selectedExercise) {
          return (
            <div className="fixed inset-0 z-[120] flex items-center justify-center p-4" style={{background:'radial-gradient(circle at top, rgba(249,115,22,0.12) 0%, rgba(10,10,10,0.98) 58%)'}}>
              <div className="card w-full max-w-md text-center py-8">
                <button onClick={() => setScreen(returnScreen)} className="back-button mb-4">←</button>
                <div className="text-5xl mb-3">❌</div>
                <div className="font-semibold mb-1">No exercise selected</div>
              </div>
            </div>
          );
        }

        const youtubeEmbedUrl = getExerciseYoutubeEmbedUrl(selectedExercise);
        const youtubeWatchUrl = getExerciseYoutubeWatchUrl(selectedExercise);

        return (
          <div className="fixed inset-0 z-[120] flex items-center justify-center p-4" style={{background:'radial-gradient(circle at top, rgba(249,115,22,0.12) 0%, rgba(10,10,10,0.98) 58%)'}}>
            <div className="w-full max-w-md rounded-[28px] p-5" style={{background:'linear-gradient(180deg, rgba(16,16,16,0.98) 0%, rgba(10,10,10,0.98) 100%)', border:'1px solid rgba(255,255,255,0.08)', boxShadow:'0 30px 80px rgba(0,0,0,0.38)', maxHeight:'92vh', overflowY:'auto'}}>
              <div className="flex items-start justify-between gap-4 mb-5">
                <div>
                  <div className="screen-kicker">Form & Demo</div>
                  <h2 className="text-2xl font-bold text-white">{selectedExercise.name}</h2>
                  <p className="text-sm text-gray-400 mt-1">Quick cues for the current movement.</p>
                </div>
                <button onClick={() => setScreen(returnScreen)} className="back-button" aria-label="Close form guide">×</button>
              </div>

              <div className="card hero-card mb-5 text-center">
                <div className="text-5xl mb-3">{getExerciseVideoEmoji(selectedExercise)}</div>
                <div className="dev-badge">{selectedExercise.sets}</div>
                {selectedExercise.planNote && (
                  <div className="text-xs text-gray-500 mt-2">{selectedExercise.planNote}</div>
                )}
              </div>

              <div className="card hero-card mb-5 text-center" style={{overflow:'hidden'}}>
                {youtubeEmbedUrl ? (
                  <div className="video-wrapper rounded-2xl" style={{border:'1px solid rgba(249,115,22,0.14)', background:'#050505'}}>
                    <iframe
                      src={youtubeEmbedUrl}
                      title={`${selectedExercise.name} demo video`}
                      loading="lazy"
                      referrerPolicy="strict-origin-when-cross-origin"
                      allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share"
                      allowFullScreen
                    />
                  </div>
                ) : (
                  <div className="rounded-2xl p-8" style={{background:'radial-gradient(circle at top, rgba(249,115,22,0.18) 0%, rgba(18,18,18,0.98) 62%)', border:'1px solid rgba(249,115,22,0.14)'}}>
                    <div className="inline-flex items-center gap-2 rounded-full px-4 py-2 text-xs font-semibold uppercase tracking-[0.18em]" style={{background:'rgba(255,255,255,0.06)', color:'#fdba74', border:'1px solid rgba(255,255,255,0.08)'}}>
                      <span>Form Demo</span>
                    </div>
                    <p className="text-sm text-gray-400 mt-4">
                      A short demo for this movement is coming soon. Use the form cues below for now.
                    </p>
                  </div>
                )}
                {youtubeWatchUrl && (
                  <div className="mt-4 flex flex-wrap items-center justify-center gap-3">
                    <a
                      href={youtubeWatchUrl}
                      target="_blank"
                      rel="noreferrer"
                      className="btn-secondary"
                      style={{width:'auto', padding:'10px 16px'}}
                    >
                      Open in YouTube
                    </a>
                  </div>
                )}
              </div>

              <CoachingStepsSection exercise={selectedExercise} compact />
              <WatchoutsSection exercise={selectedExercise} compact />

              <div className="space-y-3">
                <button 
                  className="nav-cta"
                  onClick={() => {
                    setScreen('workout');
                    setWorkoutStarted(true);
                    setLastWorkoutStartedAt(new Date().toISOString());
                    const workoutInfo = getWorkoutInfo(currentDay, currentWeek);
                    const currentDayExercises = workoutInfo ? programExercises[workoutInfo.exerciseDay] || programExercises.day1 : programExercises.day1;
                    const exerciseIndex = currentDayExercises.findIndex(ex => ex.id === selectedExercise.id);
                    setCurrentExercise(exerciseIndex >= 0 ? exerciseIndex : 0);
                  }}
                >
                  Start This Exercise
                </button>

                <button 
                  className="btn-secondary"
                  onClick={() => setScreen(returnScreen)}
                >
                  {returnScreen === 'workout' ? 'Back to Live Session' : 'Back to Workout List'}
                </button>
              </div>
            </div>
          </div>
        );
      }
    }

    ReactDOM.render(<App />, document.getElementById('root'));
  </script>
</body>
</html>
