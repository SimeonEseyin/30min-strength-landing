      if (normalized.includes('deadlift') || normalized.includes('rdl') || normalized.includes('swing')) {

    function parseDurationToSeconds(duration = '0:45') {
      const parts = String(duration || '0:45').split(':');
      const mins = parseInt(parts[0], 10) || 0;
      const secs = parseInt(parts[1], 10) || 0;
      const total = mins * 60 + secs;
      return total > 0 ? total : 45;
    }

    function formatDurationFromSeconds(totalSeconds = 45) {
      const clamped = Math.max(20, Math.min(120, totalSeconds));
      const mins = Math.floor(clamped / 60);
      const secs = clamped % 60;
      return `${mins}:${String(secs).padStart(2, '0')}`;
    }

    function adjustDuration(duration, deltaSeconds = 0) {
      return formatDurationFromSeconds(parseDurationToSeconds(duration) + deltaSeconds);

    function getSetCount(setsText = '') {
      const match = String(setsText).match(/(\d+)\s+sets/i);
      return match ? parseInt(match[1], 10) : null;

    function isUnilateralPrescription(setsText = '') {
      return /\beach\b|\bper side\b|\beach side\b/i.test(String(setsText));

    function getExercisePlannedSeconds(exercise = {}) {
      const perSetSeconds = parseDurationToSeconds(exercise?.duration);
      const setCount = Math.max(1, getSetCount(exercise?.sets) || 1);
      const unilateralMultiplier = isUnilateralPrescription(exercise?.sets) ? 2 : 1;
      const betweenSetResetSeconds = setCount > 1
        ? (exercise?.tracksLoad === false ? 20 : 30) * (setCount - 1)
        : 0;

      return Math.max(20, (perSetSeconds * setCount * unilateralMultiplier) + betweenSetResetSeconds);
    }

    function updateSetCount(setsText = '', nextCount = null) {
      if (!nextCount) return setsText;
      if (/^\d+\s+sets/i.test(String(setsText))) {
        return String(setsText).replace(/^\d+\s+sets/i, `${nextCount} sets`);
      }
      return setsText;
    }

        return `${nextValue} reps`;

    function applyEquipmentVariant(exercise, config = {}) {
      const equipmentMode = getPlanEquipmentMode(config);
      const variant = (equipmentExerciseVariants[equipmentMode] || {})[exercise.name];
      if (!variant) return cloneExerciseWithPlan(exercise, { equipmentMode });

      return cloneExerciseWithPlan(exercise, {
        ...variant,
        equipmentMode,
        variantOf: exercise.name,
        tracksLoad: variant.tracksLoad === false ? false : exercise.tracksLoad !== false,
        instructions: Array.isArray(variant.instructions)
          ? variant.instructions
          : [...(exercise.instructions || [])],
        mistakes: Array.isArray(variant.mistakes)
          ? variant.mistakes
          : [...(exercise.mistakes || [])]
      });
    }

    function deriveSuggestedGoalsFromPlan(config = {}) {
      const equipmentLabel = Array.isArray(config.availableEquipment) && config.availableEquipment.length
        ? config.availableEquipment[0]
        : 'bodyweight';
      const consistencyGoal = config.scheduleTemplate === '4-day'
        ? (config.sessionLength >= 45 ? 85 : 80)
        : (config.sessionLength <= 15 ? 65 : 75);

      if (config.focus === 'Build muscle') {
        return {
          strengthGoal: `Own your main ${equipmentLabel.toLowerCase()} lifts with cleaner, higher-quality reps`,
          customGoal: 'Build visible muscle with a repeatable weekly rhythm.',
          consistencyGoal
        };
      }

      if (config.focus === 'Lose fat') {
        return {
          strengthGoal: 'Keep strength moving up while training at a steady, sustainable pace',
          customGoal: 'Lean out without losing the training habit.',
          consistencyGoal
        };
      }

      if (config.focus === 'Stay consistent') {
        return {
          strengthGoal: 'String together simple sessions until the week feels automatic',
          customGoal: 'Lower friction so training survives busy family weeks.',
          consistencyGoal: Math.max(65, consistencyGoal - 5)
        };
      }

      return {
        strengthGoal: `Progress your main ${equipmentLabel.toLowerCase()} movements week by week`,
        customGoal: 'Build practical strength with a plan that fits family life.',
        consistencyGoal
      };
    }

    function syncGoalsWithPlanConfig(goals = {}, config = {}) {
      const suggested = deriveSuggestedGoalsFromPlan(config);
      return {
        ...goals,
        strengthGoal: goals.strengthGoal || suggested.strengthGoal,
        customGoal: goals.customGoal || suggested.customGoal,
        consistencyGoal: Number(goals.consistencyGoal || 80) === 80 ? suggested.consistencyGoal : goals.consistencyGoal
      };
    }

    function applyPrescriptionAdjustments(exercise, config = {}, week = 1) {
      let adjusted = cloneExerciseWithPlan(exercise);
      const planNotes = [];

      if (config.focus === 'Build muscle') {
        adjusted.sets = updateSetCount(adjusted.sets, adjusted.tracksLoad === false ? 3 : 4);
        adjusted.sets = updateRepTarget(adjusted.sets, 2, 8, 18);
        adjusted.duration = adjustDuration(adjusted.duration, 5);
        planNotes.push('Muscle bias: more total volume');
      } else if (config.focus === 'Lose fat') {
        adjusted.sets = updateRepTarget(adjusted.sets, adjusted.tracksLoad === false ? 2 : 1, 8, 20);
        adjusted.duration = adjustDuration(adjusted.duration, -5);
        planNotes.push('Fat-loss bias: faster session pacing');
      } else if (config.focus === 'Stay consistent') {
        adjusted.sets = updateSetCount(adjusted.sets, adjusted.tracksLoad === false ? 2 : 2);
        adjusted.duration = adjustDuration(adjusted.duration, -10);
        planNotes.push('Consistency bias: lower-friction start');
      } else if (adjusted.tracksLoad !== false) {
        adjusted.sets = updateRepTarget(adjusted.sets, -2, 5, 12);
        planNotes.push('Strength bias: tighter rep targets');
      }

      if (config.recoveryMode === 'light' && week <= 2) {
        adjusted.sets = updateSetCount(adjusted.sets, 2);
        adjusted.duration = adjustDuration(adjusted.duration, -10);
        planNotes.push('Recovery ramp: reduced week 1-2 volume');
      } else if (config.recoveryMode === 'moderate' && week <= 2) {
        adjusted.duration = adjustDuration(adjusted.duration, -5);
        planNotes.push('Recovery ramp: controlled first two weeks');
      }

      return {
        ...adjusted,
        planNote: planNotes.join(' • ')
      };
    }

      return Object.fromEntries(

        ])

    function getCoachingCueParts(text = '') {
      const normalized = String(text || '').trim();
      if (!normalized) {
        return { lead: '', detail: '' };
      }

      const separators = [', ', ' while ', ' until ', ' and '];
      let splitIndex = -1;
      let separatorLength = 0;

      separators.forEach(separator => {
        const idx = normalized.indexOf(separator);
        if (idx >= 12 && (splitIndex === -1 || idx < splitIndex)) {
          splitIndex = idx;
          separatorLength = separator.length;
        }
      });

      if (splitIndex === -1) {
        return { lead: normalized, detail: '' };
      }

      return {
        lead: normalized.slice(0, splitIndex).trim(),
        detail: normalized.slice(splitIndex + separatorLength).trim(),
      };
    }

    function getPrimaryFocusCue(exercise) {
      if (!exercise?.instructions || exercise.instructions.length === 0) {
        return null;

      const cue = getCoachingCueParts(exercise.instructions[0]);
      return cue.lead ? cue : { lead: exercise.instructions[0], detail: '' };

    function getStrengthProgressLog(exerciseWeights) {
      const groupedHistory = {};

      Object.entries(exerciseWeights || {}).forEach(([storedName, history]) => {
        if (!Array.isArray(history)) return;
        if (!doesExerciseTrackLoad(storedName)) return;

        history.forEach(entry => {
          const weight = Number(entry?.weight);
          if (!Number.isFinite(weight) || weight <= 0) return;

          const exerciseName = entry.exerciseName || storedName;
          if (!doesExerciseTrackLoad(exerciseName)) return;
          const derivedMeta = getProgressionMeta(exerciseName);
          const meta = {
            key: entry.progressionGroup || derivedMeta.key,
            label: entry.progressionLabel || derivedMeta.label
          };
          const dayKey = Number.isFinite(entry?.day) ? entry.day : 'x';
          const weekKey = Number.isFinite(entry?.week) ? entry.week : 'x';
          const cycleKey = Number.isFinite(entry?.cycleNumber) ? entry.cycleNumber : 1;
          const dateKey = entry?.date ? new Date(entry.date).toISOString().slice(0, 10) : 'undated';
          const sessionKey = `${meta.key}:${cycleKey}:${weekKey}:${dayKey}:${dateKey}`;

          if (!groupedHistory[meta.key]) {
            groupedHistory[meta.key] = {
              key: meta.key,
              name: meta.label,
              sessions: {}
            };
          }

          if (!groupedHistory[meta.key].sessions[sessionKey]) {
            groupedHistory[meta.key].sessions[sessionKey] = {
              weight,
              date: entry.date || new Date().toISOString(),
              week: entry.week,
              day: entry.day,
              cycleNumber: cycleKey,
              exerciseNames: [exerciseName]
            };
            return;
          }

          const session = groupedHistory[meta.key].sessions[sessionKey];
          session.weight = Math.max(session.weight, weight);
          if (!session.exerciseNames.includes(exerciseName)) {
            session.exerciseNames.push(exerciseName);
          }
          if (entry.date && new Date(entry.date) > new Date(session.date)) {
            session.date = entry.date;
          }
        });
      });

      return Object.values(groupedHistory)
        .map(group => {
          const history = Object.values(group.sessions)
            .map(session => ({
              ...session,
              exerciseNames: [...session.exerciseNames].sort()
            }))
            .sort((a, b) => new Date(a.date) - new Date(b.date));

          const first = history[0]?.weight ?? 0;
          const last = history[history.length - 1]?.weight ?? 0;
          const delta = last - first;
          const trend = delta > 0 ? '↑' : delta < 0 ? '↓' : '→';
          const trendColor = delta > 0 ? '#22c55e' : delta < 0 ? '#ef4444' : '#a3a3a3';
          const latestExercises = history[history.length - 1]?.exerciseNames || [];

          return {
            key: group.key,
            name: group.name,
            history,
            latestExercises,
            first,
            last,
            delta,
            trend,
            trendColor
          };
        })
        .filter(group => group.history.length > 0)
        .sort((a, b) => new Date(b.history[b.history.length - 1].date) - new Date(a.history[a.history.length - 1].date));
    }

    function formatSessionLabel(entry, includeCycle = true) {
      const baseLabel = `W${entry.week}D${entry.day}`;
      if (includeCycle && Number.isFinite(entry.cycleNumber)) {
        return `C${entry.cycleNumber} ${baseLabel}`;
      }
      return baseLabel;

    function Sparkline({ history }) {
      if (history.length < 2) return null;

      const W = 56;
      const H = 22;
      const pad = 2;
      const ws = history.map(entry => entry.weight);
      const lo = Math.min(...ws);
      const hi = Math.max(...ws);
      const isFlat = hi === lo;
      const scaleRange = isFlat ? 1 : hi - lo;
      const midY = H / 2;
      const pts = ws.map((weight, index) => {
        const x = pad + (index / (ws.length - 1)) * (W - pad * 2);
        const y = isFlat
          ? midY
          : H - pad - ((weight - lo) / scaleRange) * (H - pad * 2);
        return [x, y];
      });
      const line = pts.map(point => point.join(',')).join(' ');
      const area = `${pts[0][0]},${H} ${line} ${pts[pts.length - 1][0]},${H}`;

      return (
        <svg width={W} height={H} viewBox={`0 0 ${W} ${H}`} style={{flexShrink: 0}} aria-hidden="true" className="sparkline-shell">
          <polygon points={area} fill="rgba(249,115,22,0.15)" />
          <polyline points={line} fill="none" stroke="#f97316" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round" className="sparkline-line" />
          <circle cx={pts[pts.length - 1][0]} cy={pts[pts.length - 1][1]} r="2.5" fill="#f97316" />
        </svg>
      );
    }

    function LineChart({ history }) {
      const VW = 300;
      const VH = 110;
      const pL = 38;
      const pR = 12;
      const pT = 10;
      const pB = 28;
      const plotW = VW - pL - pR;
      const plotH = VH - pT - pB;
      const ws = history.map(entry => entry.weight);
      const lo = Math.min(...ws);
      const hi = Math.max(...ws);
      const isFlat = hi === lo;
      const scaleRange = isFlat ? 1 : hi - lo;
      const centerY = pT + plotH / 2;
      const pts = history.map((entry, index) => ({
        x: pL + (history.length > 1 ? (index / (history.length - 1)) : 0.5) * plotW,
        y: isFlat
          ? centerY
          : pT + plotH - ((entry.weight - lo) / scaleRange) * plotH,
        entry
      }));
      const line = pts.map(point => `${point.x},${point.y}`).join(' ');
      const area = `${pts[0].x},${pT + plotH} ${line} ${pts[pts.length - 1].x},${pT + plotH}`;
      const yTicks = isFlat
        ? [{ value: lo, y: centerY }]
        : [
            { value: lo, y: pT + plotH },
            { value: lo + (hi - lo) / 2, y: pT + plotH / 2 },
            { value: hi, y: pT }
          ];
      const labelStep = history.length <= 4 ? 1 : Math.ceil(history.length / 4);

      return (
        <svg width="100%" viewBox={`0 0 ${VW} ${VH}`} className="chart-shell">
          {yTicks.map((tick, index) => (
            <g key={index}>
              <line x1={pL} y1={tick.y} x2={VW - pR} y2={tick.y} stroke="#2a2a2a" strokeWidth="1" />
              <text x={pL - 4} y={tick.y + 3.5} textAnchor="end" fontSize="8" fill="#737373">
                {formatWeightTick(tick.value)}
              </text>
            </g>
          ))}
          <polygon points={area} fill="rgba(249,115,22,0.12)" className="chart-area" />
          <polyline points={line} fill="none" stroke="#f97316" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className="chart-line" />
          {pts.map((point, index) => {
            const showLabel = index === 0 || index === pts.length - 1 || index % labelStep === 0;
            return (
              <g key={index}>
                <circle
                  cx={point.x}
                  cy={point.y}
                  r="3.5"
                  fill="#f97316"
                  stroke="#0a0a0a"
                  strokeWidth="1.5"
                  className="chart-point"
                  style={{ animationDelay: `${220 + index * 90}ms` }}
                />
                {showLabel && (
                  <text x={point.x} y={VH - 4} textAnchor="middle" fontSize="7" fill="#737373">
                    {formatSessionLabel(point.entry)}
                  </text>
                )}
              </g>
            );
          })}
        </svg>
      );
    }

    function MotionSection({ children, delay = 0, className = '', subtle = false, style = {} }) {
      const motionClass = subtle ? 'motion-section-subtle' : 'motion-section';
      const classes = [motionClass, className].filter(Boolean).join(' ');

    function AnimatedNumber({ value, prefix = '', suffix = '', decimals = 0, className = '' }) {
      const numericValue = Number(value);
      const [displayValue, setDisplayValue] = React.useState(Number.isFinite(numericValue) ? 0 : value);

      React.useEffect(() => {
        if (!Number.isFinite(numericValue)) {
          setDisplayValue(value);
          return;
        }

        let frameId;
        const startValue = Number(displayValue) || 0;
        const delta = numericValue - startValue;
        const duration = 700;
        const startTime = performance.now();

        const step = (now) => {
          const progress = Math.min((now - startTime) / duration, 1);
          const eased = 1 - Math.pow(1 - progress, 3);
          setDisplayValue(startValue + delta * eased);
          if (progress < 1) {
            frameId = requestAnimationFrame(step);
          }
        };

        frameId = requestAnimationFrame(step);
        return () => cancelAnimationFrame(frameId);
      }, [numericValue]);

      if (!Number.isFinite(numericValue)) {
        return <span className={className}>{value}</span>;
      }

      return (
        <span className={className}>
          {prefix}
          {Number(displayValue).toFixed(decimals).replace(/\.0+$/, '')}
          {suffix}
        </span>
      );
    }

          if (!raw) return false;

          const parsed = JSON.parse(raw);
          if (!parsed || typeof parsed !== 'object' || !parsed.coach) return false;

          setAiCoach(parsed.coach);

          lastAiSnapshot.current = typeof parsed.snapshot === 'string' ? parsed.snapshot : '';

        const minutesMatch = timeValue.match(/\d+/);

        const hasDumbbells = equipment.includes('Dumbbells');

        let customGoal = 'Build a training rhythm that fits family life.';

        if (goal === 'Build strength') {
          customGoal = 'Build practical strength with short, repeatable sessions.';

          customGoal = 'Add lean muscle without needing long workouts.';

          strengthGoal = 'Maintain strength while leaning down';
        } else if (goal === 'Stay consistent') {
          customGoal = 'Make training automatic even on busy weeks.';
          strengthGoal = 'Finish each week with momentum, not decision fatigue';
        }

        let consistencyGoal = 80;
        if (minutes <= 15) consistencyGoal = 65;

        if (hasCustomizedGoals(data)) return false;

      }

      function applyQuizSeedToUserData(data, profile) {
        const baseData = data || buildDefaultUserData();
        return {
          ...baseData,
          progress: {
            ...baseData.progress,
            goals: {
              ...baseData.progress.goals,
              ...deriveSeedGoalsFromQuiz(profile)
            }
          },
          planConfig: derivePlanConfigFromQuiz(profile),
          intake: {
            ...defaultOnboardingIntake,
            source: 'quiz',
            capturedAt: profile.capturedAt || new Date().toISOString(),
            seededAt: new Date().toISOString(),
            quizAnswers: {
              goal: profile.answers.goal || '',
              time: profile.answers.time || '',
              location: profile.answers.location || '',
              sleep: profile.answers.sleep || '',
              challenge: profile.answers.challenge || '',
              equipment: Array.isArray(profile.answers.equipment) ? profile.answers.equipment : []
            },
            preview: profile.preview || null
          }
        };
      }

      function buildDefaultUserData() {
        return {
          progress: {
            currentWeek: 1,
            currentDay: 1,
            completedDays: [],
            workoutFeedback: {},
            lastWorkoutStartedAt: null,
            goals: defaultGoals,
            currentCycleNumber: 1,
            lastUpdated: null
          },
          history: [],
          settings: defaultSettings,
          profile: defaultUserProfile,
          weights: {},
          coachCache: {
            coach: null,
            snapshot: '',
            updatedAt: null
          },
          planConfig: defaultPlanConfig,
          intake: defaultOnboardingIntake,
          updatedAt: null
        };
      }

      function normalizeSettingsDraft(draft = {}) {
        const normalizedTime = /^\d{2}:\d{2}$/.test(String(draft.notificationTime || ''))
          ? String(draft.notificationTime)
          : defaultSettings.notificationTime;
        const normalizedTimezone = String(draft.notificationTimezone || '').trim() || getBrowserTimeZone();

        return {
          ...defaultSettings,
          units: draft.units === 'kg' ? 'kg' : 'lbs',
          darkMode: true,
          notificationEnabled: Boolean(draft.notificationEnabled),
          notificationTimezone: normalizedTimezone,
          notificationTime: normalizedTime
        };
      }

      function normalizePlanConfigDraft(draft = {}) {
        const validSessionLengths = new Set([15, 30, 45, 60]);
        const validRecoveryModes = new Set(['light', 'moderate', 'normal']);
        const validScheduleTemplates = new Set(['3-day', '4-day']);
        const selectedEquipment = Array.isArray(draft.availableEquipment)
          ? draft.availableEquipment.filter(Boolean).slice(0, 8)
          : [];

        return {
          ...defaultPlanConfig,
          focus: getFocusLabel(draft.focus || defaultPlanConfig.focus),
          sessionLength: validSessionLengths.has(Number(draft.sessionLength)) ? Number(draft.sessionLength) : defaultPlanConfig.sessionLength,
          trainingEnvironment: defaultPlanConfig.trainingEnvironment,
          availableEquipment: selectedEquipment.length ? selectedEquipment : ['Bodyweight only'],
          recoveryMode: validRecoveryModes.has(String(draft.recoveryMode || '')) ? String(draft.recoveryMode) : defaultPlanConfig.recoveryMode,
          scheduleTemplate: validScheduleTemplates.has(String(draft.scheduleTemplate || '')) ? String(draft.scheduleTemplate) : defaultPlanConfig.scheduleTemplate,
          seededFromQuiz: Boolean(draft.seededFromQuiz),
          lastAdjustedAt: draft.lastAdjustedAt || null
        };
      }

      function buildPlanConfigFromIntake(intake) {
        const quizAnswers = intake?.quizAnswers;
        if (!quizAnswers || typeof quizAnswers !== 'object') return null;

        return derivePlanConfigFromQuiz({
          answers: quizAnswers,
          preview: intake?.preview || {},
          capturedAt: intake?.capturedAt || intake?.seededAt || null
        });
      }

      async function apiRequest(path, options = {}) {
        const response = await fetch(path, {
          credentials: 'include',
          headers: {
            'Content-Type': 'application/json',
            ...(options.headers || {})
          },
          ...options
        });

        let payload = {};
        try {
          payload = await response.json();
        } catch (error) {
          payload = {};
        }

        if (!response.ok) {
          const requestError = new Error(payload.error || 'Request failed');
          requestError.status = response.status;
          requestError.payload = payload;
          throw requestError;
        }

        return payload;
      }

      function delay(ms) {
        return new Promise(resolve => setTimeout(resolve, ms));
      }

      function getBrowserTimeZone() {
        try {
          return Intl.DateTimeFormat().resolvedOptions().timeZone || 'UTC';
        } catch (error) {
          return 'UTC';
        }
      }

      function browserSupportsPushNotifications() {
        return typeof window !== 'undefined' &&
          'Notification' in window &&
          'serviceWorker' in navigator &&
          'PushManager' in window;
      }

      function urlBase64ToUint8Array(base64String) {
        const padding = '='.repeat((4 - (base64String.length % 4)) % 4);
        const base64 = `${base64String}${padding}`.replace(/-/g, '+').replace(/_/g, '/');
        const rawData = window.atob(base64);
        return Uint8Array.from(rawData, char => char.charCodeAt(0));
      }

      async function fetchPushConfiguration() {
        try {
          return await apiRequest('/.netlify/functions/push-subscription', { method: 'GET' });
        } catch (error) {
          return {
            configured: false,
            publicKey: '',
            subject: ''
          };
        }
      }

      async function getActivePushSubscription() {
        if (!browserSupportsPushNotifications()) {
          return {
            registration: null,
            subscription: null
          };
        }

        const registration = await navigator.serviceWorker.ready;
        const subscription = await registration.pushManager.getSubscription();
        return { registration, subscription };
      }

      async function syncPushSubscription(nextSettings = settings) {
        if (!browserSupportsPushNotifications() || !currentUser?.email) {
          return {
            supported: false,
            configured: false,
            subscribed: false
          };
        }

        const pushConfig = await fetchPushConfiguration();
        if (!pushConfig.configured || !pushConfig.publicKey) {
          return {
            supported: true,
            configured: false,
            subscribed: false
          };
        }

        const normalizedSettings = normalizeSettingsDraft(nextSettings);
        const { registration, subscription: existingSubscription } = await getActivePushSubscription();
        let subscription = existingSubscription;

        if (!subscription) {
          subscription = await registration.pushManager.subscribe({
            userVisibleOnly: true,
            applicationServerKey: urlBase64ToUint8Array(pushConfig.publicKey)
          });
        }

        await apiRequest('/.netlify/functions/push-subscription', {
          method: 'POST',
          body: JSON.stringify({
            subscription: subscription.toJSON(),
            notificationTime: normalizedSettings.notificationTime,
            notificationTimezone: normalizedSettings.notificationTimezone
          })
        });

        return {
          supported: true,
          configured: true,
          subscribed: true
        };
      }

      async function removePushSubscription() {
        if (!browserSupportsPushNotifications() || !currentUser?.email) {
          return false;
        }

        const { subscription } = await getActivePushSubscription();
        const subscriptionPayload = subscription ? subscription.toJSON() : null;

        if (!subscriptionPayload?.endpoint) {
          return false;
        }

        try {
          await apiRequest('/.netlify/functions/push-subscription', {
            method: 'DELETE',
            body: JSON.stringify({ subscription: subscriptionPayload })
          });
        } catch (error) {
          if (!isUnauthorizedError(error)) {
            throw error;
          }
        }

        if (subscription) {
          try {
            await subscription.unsubscribe();
          } catch (error) {
          }
        }

        return true;
      }

      function getReminderCopy(isTest = false) {
        const phaseLabel = currentPhase ? `${currentPhase.toLowerCase()} block` : 'next block';
        return {
          title: isTest ? 'DevDad reminder is on' : 'Time for your 30-minute session',
          body: isTest
            ? `Notifications are enabled. Your daily reminder is set for ${settings.notificationTime}.`
            : `Week ${currentWeek}, Day ${currentDay} is ready. Keep the ${phaseLabel} moving.`
        };
      }

      async function syncNotificationPermissionState() {
        const nextPermission = typeof window === 'undefined' || !('Notification' in window)
          ? 'unsupported'
          : window.Notification.permission || 'default';
        setNotificationPermission(nextPermission);
        return nextPermission;
      }

      async function requestNotificationPermission() {
        if (typeof window === 'undefined' || !('Notification' in window)) {
          setNotificationPermission('unsupported');
          return 'unsupported';
        }

        if (window.Notification.permission === 'granted') {
          setNotificationPermission('granted');
          return 'granted';
        }

        const nextPermission = await window.Notification.requestPermission();
        setNotificationPermission(nextPermission);
        return nextPermission;
      }

      async function deliverWorkoutReminder({ isTest = false } = {}) {
        if (typeof window === 'undefined' || !('Notification' in window) || window.Notification.permission !== 'granted') {
          return false;
        }

        const copy = getReminderCopy(isTest);
        const options = {
          body: copy.body,
          icon: '/icons/web-app-manifest-192x192.png',
          badge: '/icons/favicon-96x96.png',
          tag: isTest ? 'devdad-reminder-test' : 'devdad-daily-reminder',
          renotify: isTest,
          data: {
            url: '/app'
          }
        };

        if ('serviceWorker' in navigator) {
          try {
            const registration = await navigator.serviceWorker.getRegistration();
            if (registration) {
              await registration.showNotification(copy.title, options);
              return true;
            }
          } catch (error) {
          }
        }

        try {
          new window.Notification(copy.title, options);
          return true;
        } catch (error) {
          return false;
        }
      }

      function isUnauthorizedError(error) {
        return error?.status === 401 || error?.message === 'Unauthorized';
      }

      async function waitForAuthenticatedSession(expectedEmail = '', maxAttempts = 4) {
        const normalizedExpectedEmail = String(expectedEmail || '').trim().toLowerCase();

        for (let attempt = 0; attempt < maxAttempts; attempt++) {
          try {
            const sessionResult = await apiRequest('/.netlify/functions/auth-session', { method: 'GET' });
            const sessionUser = sessionResult.user;
            const sessionEmail = String(sessionUser?.email || '').trim().toLowerCase();

            if (sessionUser && (!normalizedExpectedEmail || sessionEmail === normalizedExpectedEmail)) {
              return sessionUser;
            }
          } catch (error) {
          }

          if (attempt < maxAttempts - 1) {
            await delay(150 * (attempt + 1));
          }
        }

        return null;
      }

      function getDaysSinceFromFeedback(feedbackData = {}) {
        const completedWorkouts = Object.values(feedbackData || {}).filter(f => isWorkoutFeedbackType(f?.feedback));
        if (completedWorkouts.length === 0) return 0;

        const lastDate = completedWorkouts
          .map(f => new Date(f.date))
          .filter(date => !Number.isNaN(date.getTime()))
          .sort((a, b) => b - a)[0];

        if (!lastDate) return 0;
        return Math.floor((Date.now() - lastDate.getTime()) / 86400000);
      }

      function hydrateUserData(data) {
        const safeData = data || buildDefaultUserData();
        const progress = safeData.progress || buildDefaultUserData().progress;

        setCurrentWeek(progress.currentWeek || 1);
        setCurrentDay(progress.currentDay || 1);
        setCompletedDays(progress.completedDays || []);
        setWorkoutFeedback(progress.workoutFeedback || {});
        setLastWorkoutStartedAt(progress.lastWorkoutStartedAt || null);
        setGoals(progress.goals || defaultGoals);
        setCurrentCycleNumber(progress.currentCycleNumber || 1);
        setProgramHistory(Array.isArray(safeData.history) ? safeData.history : []);
        setSettings(normalizeSettingsDraft(safeData.settings));
        setUserProfile(safeData.profile || defaultUserProfile);
        setExerciseWeights(safeData.weights || {});
        setDaysSinceLastWorkout(getDaysSinceFromFeedback(progress.workoutFeedback || {}));
        const persistedCoachCache = safeData.coachCache || buildDefaultUserData().coachCache;
        setAiCoach(persistedCoachCache.coach || null);
        setAiCoachStatus(persistedCoachCache.coach ? 'ready' : 'idle');
        lastAiSnapshot.current = persistedCoachCache.snapshot || '';
        setPlanConfig(safeData.planConfig || defaultPlanConfig);
        setOnboardingIntake(safeData.intake || defaultOnboardingIntake);
      }

      function getLegacyUserData(emailAddress) {
        if (!emailAddress) return buildDefaultUserData();

        let progress = null;
        let history = [];
        let storedSettings = null;
        let profile = null;
        let weights = null;

        try {
          progress = JSON.parse(localStorage.getItem(`progress_${emailAddress}`) || 'null');
        } catch (error) {
          progress = null;
        }

        try {
          history = JSON.parse(localStorage.getItem(`history_${emailAddress}`) || '[]');
        } catch (error) {
          history = [];
        }

        try {
          storedSettings = JSON.parse(localStorage.getItem(`settings_${emailAddress}`) || 'null');
        } catch (error) {
          storedSettings = null;
        }

        try {
          profile = JSON.parse(localStorage.getItem(`profile_${emailAddress}`) || 'null');
        } catch (error) {
          profile = null;
        }

        try {
          weights = JSON.parse(localStorage.getItem(`weights_${emailAddress}`) || 'null');
        } catch (error) {
          weights = null;
        }

        return {
          progress: {
            ...buildDefaultUserData().progress,
            ...(progress || {}),
            goals: {
              ...defaultGoals,
              ...((progress || {}).goals || {})
            }
          },
          history: Array.isArray(history) ? history : [],
          settings: normalizeSettingsDraft(storedSettings || buildDefaultUserData().settings),
          profile: profile || defaultUserProfile,
          weights: weights || {},
          coachCache: buildDefaultUserData().coachCache,
          planConfig: defaultPlanConfig,
          intake: defaultOnboardingIntake,
          updatedAt: null
        };
      }

      function hasMeaningfulUserData(data) {
        const progress = data?.progress || {};
        return Boolean(
          (Array.isArray(progress.completedDays) && progress.completedDays.length) ||
          (progress.workoutFeedback && Object.keys(progress.workoutFeedback).length) ||
          (Array.isArray(data?.history) && data.history.length) ||
          (data?.weights && Object.keys(data.weights).length) ||
          (data?.profile?.weightHistory && data.profile.weightHistory.length) ||
          Boolean(data?.profile?.avatarDataUrl)
        );
      }

      async function persistUserData(payloadOverride = null) {
        const payload = payloadOverride || {
          progress: {
            currentWeek,
            currentDay,
            completedDays,
            workoutFeedback,
            lastWorkoutStartedAt,
            goals,
            currentCycleNumber,
            lastUpdated: new Date().toISOString()
          },
          history: programHistory,
          settings,
          profile: userProfile,
          weights: exerciseWeights,
          coachCache: {
            coach: aiCoach,
            snapshot: lastAiSnapshot.current,
            updatedAt: aiCoach ? new Date().toISOString() : null
          },
          planConfig,
          intake: onboardingIntake
        };

        const serialized = JSON.stringify(payload);
        await apiRequest('/.netlify/functions/save-user-data', {
          method: 'POST',
          body: serialized
        });
        lastSavedPayload.current = serialized;
      }

      async function loadUserData(emailAddress, options = {}) {
        const {
          allowUnauthorizedFallback = false,
          retries = 2
        } = options;

        let serverData = null;
        let usedFallback = false;
        let appliedQuizSeed = false;

        for (let attempt = 0; attempt <= retries; attempt++) {
          try {
            const serverPayload = await apiRequest('/.netlify/functions/load-user-data', { method: 'GET' });
            serverData = serverPayload.data || buildDefaultUserData();
            break;
          } catch (error) {
            const unauthorized = isUnauthorizedError(error);
            const canRetry = unauthorized && attempt < retries;

            if (canRetry) {
              await delay(150 * (attempt + 1));
              continue;
            }

            if (unauthorized && allowUnauthorizedFallback) {
              serverData = getLegacyUserData(emailAddress);
              usedFallback = true;
              break;
            }

            throw error;
          }
        }

        if (!hasMeaningfulUserData(serverData)) {
          const legacyData = getLegacyUserData(emailAddress);
          if (hasMeaningfulUserData(legacyData)) {
            hydrateUserData(legacyData);
            hydrationReady.current = true;
            await persistUserData(legacyData);
            return {
              daysSince: getDaysSinceFromFeedback(legacyData.progress.workoutFeedback),
              usedFallback,
              appliedQuizSeed
            };
          }
        }

        const storedQuizProfile = getQuizProfileForEmail(emailAddress);
        if (shouldApplyQuizSeed(serverData, storedQuizProfile)) {
          serverData = applyQuizSeedToUserData(serverData, storedQuizProfile);
          appliedQuizSeed = true;
          clearStoredQuizProfile(emailAddress);
        } else if (serverData?.intake?.seededAt) {
          clearStoredQuizProfile(emailAddress);
        }

        hydrateUserData(serverData);
        hydrationReady.current = true;
        if (appliedQuizSeed) {
          await persistUserData(serverData);
        }
        lastSavedPayload.current = JSON.stringify({
          progress: serverData.progress || buildDefaultUserData().progress,
          history: serverData.history || [],
          settings: serverData.settings || buildDefaultUserData().settings,
          profile: serverData.profile || defaultUserProfile,
          weights: serverData.weights || {},
          coachCache: serverData.coachCache || buildDefaultUserData().coachCache,
          planConfig: serverData.planConfig || defaultPlanConfig,
          intake: serverData.intake || defaultOnboardingIntake
        });
        return {
          daysSince: getDaysSinceFromFeedback((serverData.progress || {}).workoutFeedback || {}),
          usedFallback,
          appliedQuizSeed
        };
      }

      function resetUserScopedState() {
        setCurrentWeek(1);
        setCurrentDay(1);
        setCompletedDays([]);
        setWorkoutFeedback({});
        setLastWorkoutStartedAt(null);
        setGoals(defaultGoals);
        setProgramHistory([]);
        setCurrentCycleNumber(1);
        setSettings(defaultSettings);
        setUserProfile(defaultUserProfile);
        setExerciseWeights({});
        setDaysSinceLastWorkout(0);
        setAiCoach(null);
        setAiCoachStatus('idle');
        setPlanConfig(defaultPlanConfig);
        setOnboardingIntake(defaultOnboardingIntake);
        hydrationReady.current = false;

      function clearScheduledReminder() {
      }

      function getActualWorkoutCount(feedback = workoutFeedback) {
        return getWorkoutCountFromFeedback(feedback);
      }

      function getRecentFeedbackEntries(limit = 3) {
        return Object.values(workoutFeedback || {})
          .filter(entry => entry && isWorkoutFeedbackType(entry.feedback) && entry.date)
          .sort((a, b) => new Date(b.date) - new Date(a.date))
          .slice(0, limit)
          .map(entry => ({
            feedback: entry.feedback,
            week: entry.week,
            day: entry.day,
            date: entry.date
          }));
      }

      function getWeekSchedule(config = planConfig) {
        if (config.scheduleTemplate === '4-day') {
          return {
            1: { type: 'Push + Squat', exerciseDay: 'day1' },
            2: { type: 'Pull + Hinge', exerciseDay: 'day2' },
            4: { type: 'Lower', exerciseDay: 'day3' },
            6: { type: 'Full Body Power', exerciseDay: 'day4' }
          };
        }

        return {
          1: { type: 'Push + Squat', exerciseDay: 'day1' },
          3: { type: 'Pull + Hinge', exerciseDay: 'day2' },
          5: { type: 'Lower', exerciseDay: 'day3' }
        };
      }

      function getRecoveryDayLabel(day, config = planConfig) {
        const workoutDays = Object.keys(getWeekSchedule(config)).map(Number);
        const nextWorkoutDay = workoutDays.find(workoutDay => workoutDay > day);
        if (nextWorkoutDay) {
          return `Recovery day before Day ${nextWorkoutDay}.`;
        }
        return 'Recovery day before the next week begins.';
      }

      function getDayStatus(day, week = currentWeek, completedDayKeys = completedDays, config = planConfig) {
        const dayKey = `w${week}d${day}`;
        const workoutInfo = getWorkoutInfo(day, week);
        return {
          dayKey,
          workoutInfo,
          isWorkoutDay: Boolean(workoutInfo),
          isCompleted: completedDayKeys.includes(dayKey),
          isRecoveryDay: !workoutInfo
        };
      }

      function getStoredPlanSnapshot(cycle) {
        const snapshot = cycle?.planSnapshot;
        if (!snapshot || typeof snapshot !== 'object') {
          return {
            focus: 'Legacy plan',
            sessionLength: null,
            scheduleLabel: null
          };
        }

        return {
          focus: getFocusLabel(snapshot.focus || 'Build strength'),
          sessionLength: Number(snapshot.sessionLength) || null,
          scheduleLabel: getScheduleTemplateLabel(snapshot.scheduleTemplate)
        };
      }

      function getNextIncompletePosition(updatedCompletedDays, week) {
        for (let day = 1; day <= 7; day++) {
          const checkKey = `w${week}d${day}`;
          if (!updatedCompletedDays.includes(checkKey)) {
            return { week, day };
          }
        }

        if (week >= totalWeeks) {
          return null;
        }

        return { week: week + 1, day: 1 };
      }

      function getNextOpenPositionFromCursor(completedDayKeys = completedDays, startWeek = currentWeek, startDay = currentDay) {
        for (let week = startWeek; week <= totalWeeks; week++) {
          const firstDay = week === startWeek ? startDay : 1;
          for (let day = firstDay; day <= 7; day++) {
            const checkKey = `w${week}d${day}`;
            if (!completedDayKeys.includes(checkKey)) {
              return { week, day };
            }
          }
        }

        return null;
      }

      function getNextWorkoutPositionFromCursor(completedDayKeys = completedDays, startWeek = currentWeek, startDay = currentDay, config = planConfig) {
        for (let week = startWeek; week <= totalWeeks; week++) {
          const firstDay = week === startWeek ? startDay : 1;
          for (let day = firstDay; day <= 7; day++) {
            const checkKey = `w${week}d${day}`;
            if (completedDayKeys.includes(checkKey)) continue;
            if (getWorkoutInfo(day, week)) {
              return { week, day };
            }
          }
        }

        return null;
      }

      function getCurrentWorkoutSnapshot() {
        const workoutInfo = getWorkoutInfo(currentDay, currentWeek);
        if (!workoutInfo) {
          return {
            type: 'Recovery Day',
            loadableExercises: []
          };
        }

        const currentDayExercises = programExercises[workoutInfo.exerciseDay] || programExercises.day1;

        return {
          type: workoutInfo.type || 'Workout',
          loadableExercises: currentDayExercises
            .filter(exercise => doesExerciseTrackLoad(exercise))
            .map(exercise => {
              const history = Array.isArray(exerciseWeights[exercise.name]) ? exerciseWeights[exercise.name] : [];
              const lastEntry = history.length > 0 ? history[history.length - 1] : null;
              return {
                name: exercise.name,
                sets: exercise.sets,
                lastWeight: lastEntry?.weight ?? null,
                lastDate: lastEntry?.date ?? null
              };
            })
        };
      }

      function buildAiCoachSnapshot() {
        const actualWorkoutCount = getActualWorkoutCount();
        const perfectWorkouts = Object.values(workoutFeedback).filter(f => f.feedback === 'perfect').length;
        const hardWorkouts = Object.values(workoutFeedback).filter(f => f.feedback === 'hard').length;
        const easyWorkouts = Object.values(workoutFeedback).filter(f => f.feedback === 'easy').length;

        return {
          currentWeek,
          currentDay,
          currentPhase,
          currentCycleNumber,
          daysSinceLastWorkout,
          units: settings.units,
          goals: {
            strengthGoal: goals.strengthGoal || '',
            targetWeight: goals.targetWeight || '',
            consistencyGoal: goals.consistencyGoal || 80,
            customGoal: goals.customGoal || ''
          },
          stats: {
            actualWorkoutCount,
            perfectWorkouts,
            hardWorkouts,
            easyWorkouts,
            consistencyRate: Math.round((actualWorkoutCount / totalWorkouts) * 100)
          },
          plan: {
            workoutsPerWeek,
            sessionLength: planConfig.sessionLength,
            scheduleTemplate: planConfig.scheduleTemplate,
            recoveryMode: planConfig.recoveryMode
          },
          recentFeedback: getRecentFeedbackEntries(3),
          currentWorkout: getCurrentWorkoutSnapshot()
        };
      }

      // Helper function to get workout type and exercise day for a given calendar day
      const getWorkoutInfo = (calendarDay, week) => {
        const workoutMapping = getWeekSchedule(planConfig);
        return workoutMapping[calendarDay] || null;
      };

      // Calculate week from completed days
      const calculateWeekFromWorkouts = (completedCount) => {
        return Math.floor(completedCount / workoutsPerWeek) + 1;
      };

        return emailRegex.test(email);

      const validatePassword = (password) => {
        const errors = [];
        if (password.length < 8) errors.push('at least 8 characters');
        if (!/[A-Z]/.test(password)) errors.push('one uppercase letter');
        if (!/[a-z]/.test(password)) errors.push('one lowercase letter');
        if (!/[0-9]/.test(password)) errors.push('one number');
        
        if (errors.length > 0) {
          return `Password must contain ${errors.join(', ')}`;
        }
        return null;

      const checkRateLimit = (email) => {
        const now = Date.now();
        // Get existing attempts or null
        const existing = loginAttempts.current[email];

        // If no previous attempts, this is the first one - allow it
        if (!existing) {
          loginAttempts.current[email] = { count: 1, firstAttempt: now, lastAttempt: now };
          return { allowed: true };
        }

        // Reset after 15 minutes
        if (now - existing.firstAttempt > 15 * 60 * 1000) {
          loginAttempts.current[email] = { count: 1, firstAttempt: now, lastAttempt: now };
          return { allowed: true };
        }

        // Prevent spam (min 2 seconds between attempts)
        if (now - existing.lastAttempt < 2000) {
          return { allowed: false, message: 'Please wait before trying again.' };
        }

        // Max 5 attempts per 15 minutes
        if (existing.count >= 5) {
          const waitTime = Math.ceil((15 * 60 * 1000 - (now - existing.firstAttempt)) / 60000);
          return { allowed: false, message: `Too many attempts. Wait ${waitTime} minute(s).` };
        }

        loginAttempts.current[email].count++;
        loginAttempts.current[email].lastAttempt = now;
        return { allowed: true };

                setCurrentWeek(nextPosition.week);
                setCurrentDay(nextPosition.day);

      function WorkoutScreen() {
        // Exercise timer state (local to WorkoutScreen)
        const [exerciseTimeLeft, setExerciseTimeLeft] = useState(0);
        const [plannedDurationSeconds, setPlannedDurationSeconds] = useState(0);
        const [customTime, setCustomTime] = useState('');
        const [showTimeInput, setShowTimeInput] = useState(false);
        const [isTimerRunning, setIsTimerRunning] = useState(false);
        const [isTimerHudMinimized, setIsTimerHudMinimized] = useState(false);
        const [trackActualTime, setTrackActualTime] = useState(false);
        
        // Stopwatch state (actual time tracking)
        const [actualTimeElapsed, setActualTimeElapsed] = useState(0);
        const [isStopwatchRunning, setIsStopwatchRunning] = useState(false);
        const [showActualTimeInput, setShowActualTimeInput] = useState(false);
        const [actualTimeInput, setActualTimeInput] = useState('');
        
        const workoutInfo = getWorkoutInfo(currentDay, currentWeek);
        if (!workoutInfo) {
          return (
            <div className="app-screen px-6 py-8">
              <div className="card hero-card max-w-md mx-auto text-center">
                <div className="text-5xl mb-4">🛌</div>
                <h2 className="text-2xl font-bold text-white mb-2">Recovery Day</h2>
                <p className="text-sm text-gray-400 mb-4">{getRecoveryDayLabel(currentDay, planConfig)}</p>
                <button className="nav-cta mb-3" onClick={() => setScreen('home')}>
                  Back To Home
                </button>
                <button className="btn-secondary" onClick={handleRestDayComplete}>
                  Log Recovery Day
                </button>
              </div>
            </div>
          );
        }

        const exerciseDay = workoutInfo.exerciseDay;
        const dayExercises = programExercises[exerciseDay] || programExercises.day1;
        const exercise = dayExercises[currentExercise];
        const isLastExercise = currentExercise === dayExercises.length - 1;
        const youtubeId = getExerciseYoutubeId(exercise);

        // Track previous exercise to prevent unnecessary resets
        const prevExerciseRef = React.useRef(null); // Start as null to detect first mount
        const isFirstMountRef = React.useRef(true);
        
        // Refs to store interval IDs for stable timer management
        const countdownIntervalRef = React.useRef(null);
        const stopwatchIntervalRef = React.useRef(null);
        
        // Refs to track running state without triggering re-renders
        const isTimerRunningRef = React.useRef(isTimerRunning);
        const isStopwatchRunningRef = React.useRef(isStopwatchRunning);
        
        // Sync refs with state
        React.useEffect(() => {
          isTimerRunningRef.current = isTimerRunning;
        }, [isTimerRunning]);
        
        React.useEffect(() => {
          isStopwatchRunningRef.current = isStopwatchRunning;
        }, [isStopwatchRunning]);

        // Parse exercise duration from "0:45" format to seconds
        const getDefaultDuration = () => {
          return getExercisePlannedSeconds(exercise);
        };

        const getExerciseDurationSeconds = (exerciseItem) => {
          return getExercisePlannedSeconds(exerciseItem);
        };

        const plannedSecondsRemaining = dayExercises
          .slice(currentExercise + 1)
          .reduce((sum, exerciseItem) => sum + getExerciseDurationSeconds(exerciseItem), exerciseTimeLeft || getDefaultDuration());

        const plannedMinutesRemaining = Math.max(1, Math.ceil(plannedSecondsRemaining / 60));

        // Initialize timers on first mount
        React.useEffect(() => {
          if (isFirstMountRef.current) {
            isFirstMountRef.current = false;
            prevExerciseRef.current = currentExercise;
            
            const defaultTime = getDefaultDuration();
            setPlannedDurationSeconds(defaultTime);
            setExerciseTimeLeft(defaultTime);
            setActualTimeElapsed(0);
          }
        }, []); // Empty deps - runs once on mount

        // Initialize both timers when exercise ACTUALLY changes
        React.useEffect(() => {
          // Only reset if exercise actually changed
          if (prevExerciseRef.current !== currentExercise) {
            prevExerciseRef.current = currentExercise;
            
            const defaultTime = getDefaultDuration();
            
            // Reset display values
            setPlannedDurationSeconds(defaultTime);
            setExerciseTimeLeft(defaultTime);
            setActualTimeElapsed(0);
            
            // Reset running states (state and refs)
            setIsTimerRunning(false);
            setIsStopwatchRunning(false);
            isTimerRunningRef.current = false;
            isStopwatchRunningRef.current = false;
            
            // Reset input states
            setShowTimeInput(false);
            setShowActualTimeInput(false);
            setTrackActualTime(false);
            setCustomTime('');
            setActualTimeInput('');
          } else {
          }
        }, [currentExercise]);

        React.useEffect(() => {
          setIsTimerHudMinimized(Boolean(youtubeId));
        }, [youtubeId, currentExercise]);

        // Countdown timer logic - runs once, checks ref for running state
        React.useEffect(() => {
          
          const timer = setInterval(() => {
            // Check ref instead of state to avoid re-creating interval
            if (!isTimerRunningRef.current) return;
            
            setExerciseTimeLeft(prev => {
              if (prev <= 0) return 0;
              
              
              if (prev <= 1) {
                setIsTimerRunning(false);
                return 0;
              }
              return prev - 1;
            });
          }, 1000);
          
          // Store interval ID
          countdownIntervalRef.current = timer;

          // Only cleanup on unmount
          return () => {
            clearInterval(timer);
          };
        }, []); // Empty deps - only run once!

        // Stopwatch logic - runs once, checks ref for running state
        React.useEffect(() => {
          
          const timer = setInterval(() => {
            // Check ref instead of state to avoid re-creating interval
            if (!isStopwatchRunningRef.current) return;
            
            setActualTimeElapsed(prev => {
              return prev + 1;
            });
          }, 1000);
          
          // Store interval ID
          stopwatchIntervalRef.current = timer;

          // Only cleanup on unmount
          return () => {
            clearInterval(timer);
          };
        }, []); // Empty deps - only run once!

        // Format timer display
        const formatTime = (seconds) => {
          const mins = Math.floor(seconds / 60);
          const secs = seconds % 60;
          return `${mins}:${secs.toString().padStart(2, '0')}`;
        };

        // Handle custom planned time input
        const handleSetCustomTime = () => {
          const timeInSeconds = parseInt(customTime) || 45;
          setPlannedDurationSeconds(timeInSeconds);
          setExerciseTimeLeft(timeInSeconds);
          setCustomTime('');
          setShowTimeInput(false);
          setIsTimerRunning(false);
          isTimerRunningRef.current = false;
        };

        // Start the planned timer and, if enabled, the optional actual timer
        const handleStartBoth = () => {
          setIsTimerRunning(true);
          isTimerRunningRef.current = true;

          if (trackActualTime) {
            setIsStopwatchRunning(true);
            isStopwatchRunningRef.current = true;
          }
        };

        // Pause the planned timer and optional actual timer
        const handlePauseBoth = () => {
          setIsTimerRunning(false);
          isTimerRunningRef.current = false;

          if (trackActualTime) {
            setIsStopwatchRunning(false);
            isStopwatchRunningRef.current = false;
          }
        };

        // Reset both timers
        const handleResetBoth = () => {
          const defaultTime = getDefaultDuration();
          setPlannedDurationSeconds(defaultTime);
          setExerciseTimeLeft(defaultTime);
          setActualTimeElapsed(0);
          setIsTimerRunning(false);
          setIsStopwatchRunning(false);
          isTimerRunningRef.current = false;
          isStopwatchRunningRef.current = false;
        };

        // Handle navigation to next exercise
        const handleNextExercise = () => {
          // Stop timers (state and refs)
          setIsTimerRunning(false);
          setIsStopwatchRunning(false);
          isTimerRunningRef.current = false;
          isStopwatchRunningRef.current = false;
          
          if (trackActualTime && actualTimeElapsed > 0) {
            setShowActualTimeInput(true);
            setActualTimeInput(actualTimeElapsed.toString());
          } else {
            proceedToNext(null);
          }
        };

        // Proceed to next exercise after confirming time
        const proceedToNext = (confirmedTime = null) => {
          // Store actual time with exercise data
          if (confirmedTime !== null) {
            const exerciseKey = `${exercise.name}_ex${currentExercise}`;
            // Store in localStorage or state for tracking
            const actualTimes = JSON.parse(localStorage.getItem('actualExerciseTimes') || '{}');
            const workoutKey = `week${currentWeek}_day${currentDay}`;
            
            if (!actualTimes[workoutKey]) {
              actualTimes[workoutKey] = {};
            }
            
            actualTimes[workoutKey][exerciseKey] = {
              exerciseName: exercise.name,
              plannedTime: plannedDurationSeconds || getDefaultDuration(),
              actualTime: confirmedTime,
              timestamp: new Date().toISOString()
            };
            
            localStorage.setItem('actualExerciseTimes', JSON.stringify(actualTimes));
          }
          
          if (isLastExercise) {
            setScreen('complete');
          } else {
            setCurrentExercise(currentExercise + 1);
          }
        };

        const handlePreviousExercise = () => {
          if (currentExercise > 0) {

      function CompleteWorkoutScreen() {

                <button className="nav-cta" onClick={() => setScreen('home')}>

                </button>
              </div>
            </div>
          );
        }

        const todayExercises = programExercises[workoutInfo.exerciseDay] || programExercises.day1;
        const [weightInputs, setWeightInputs] = useState(() => {
          const init = {};
          todayExercises.forEach(ex => {
            if (!doesExerciseTrackLoad(ex)) {
              init[ex.name] = '';
              return;
            }
            const h = exerciseWeights[ex.name];
            const last = Array.isArray(h) && h.length > 0 ? h[h.length - 1].weight : '';
            init[ex.name] = last;
          });
          return init;
        });
        const enteredWeightCount = Object.values(weightInputs).filter(val => {
          const weight = parseFloat(val);
          return !isNaN(weight) && weight > 0;
        }).length;

        // Load actual times for this workout
        const actualTimes = JSON.parse(localStorage.getItem('actualExerciseTimes') || '{}');
        const workoutKey = `week${currentWeek}_day${currentDay}`;
        const workoutTimes = actualTimes[workoutKey] || {};
        const hasTimingData = Object.keys(workoutTimes).length > 0;

        // Calculate total planned vs actual time
        let totalPlanned = 0;
        let totalActual = 0;
        Object.values(workoutTimes).forEach(time => {
          totalPlanned += time.plannedTime || 0;
          totalActual += time.actualTime || 0;
        });

        const formatTime = (seconds) => {
          const mins = Math.floor(seconds / 60);
          const secs = seconds % 60;
          return `${mins}:${secs.toString().padStart(2, '0')}`;
        };

        return (
          <div className="app-screen flex flex-col items-center justify-center p-6 text-center">
            <div className="text-6xl mb-6">{'{ 💪 }'}</div>
            <h2 className="text-3xl font-bold mb-3" style={{color: '#f97316'}}>Day {currentDay} Complete!</h2>
            <p className="text-gray-400 mb-8">Strength earned. System working.</p>
            
            {/* Timing Summary */}
            {hasTimingData ? (
              <div className="card w-full max-w-md mb-6">

                <div className="grid grid-cols-2 gap-4 mb-4">
                  <div className="panel-muted p-4 rounded-lg">
                    <div className="text-sm text-gray-500 mb-1">Total Planned</div>
                    <div className="text-2xl font-bold" style={{color: '#fb923c'}}>
                      {formatTime(totalPlanned)}

                  <div className="panel-muted p-4 rounded-lg">
                    <div className="text-sm text-gray-500 mb-1">Total Actual</div>
                    <div className="text-2xl font-bold" style={{color: '#3b82f6'}}>
                      {formatTime(totalActual)}
                    </div>
                  </div>
                </div>
                
                {/* Difference indicator */}
                {totalActual > 0 && (
                  <div className="text-sm text-gray-400">
                    {totalActual > totalPlanned ? (
                      <span>⏱️ Took {formatTime(totalActual - totalPlanned)} longer than planned</span>
                    ) : totalActual < totalPlanned ? (
                      <span>🚀 Finished {formatTime(totalPlanned - totalActual)} faster than planned!</span>
                    ) : (
                      <span>✓ Right on target!</span>
                    )}
                  </div>
                )}
              </div>
            ) : null}
            
            {/* Weight log */}

                className="text-xs rounded-xl px-3 py-2 mb-4 text-left"
                style={{
                  background: enteredWeightCount > 0 ? 'rgba(34,197,94,0.12)' : 'rgba(249,115,22,0.12)',
                  border: enteredWeightCount > 0 ? '1px solid rgba(34,197,94,0.2)' : '1px solid rgba(249,115,22,0.2)',
                  color: enteredWeightCount > 0 ? '#bbf7d0' : '#fdba74'

              >
                {enteredWeightCount > 0
                  ? `${enteredWeightCount} ${enteredWeightCount === 1 ? 'exercise' : 'exercises'} ready to save to strength history.`

              <div className="space-y-3">
                {todayExercises.map(ex => (
                  <div key={ex.id} className="flex items-center gap-3">
                    <span className="text-sm flex-1 text-gray-300">{ex.name}</span>
                    {doesExerciseTrackLoad(ex) ? (
                      <div className="flex items-center gap-1">
                        <input
                          type="number"
                          min="0"
                          step="2.5"
                          placeholder={Array.isArray(exerciseWeights[ex.name]) && exerciseWeights[ex.name].length > 0 ? String(exerciseWeights[ex.name][exerciseWeights[ex.name].length - 1].weight) : '—'}
                          value={weightInputs[ex.name]}
                          onChange={e => setWeightInputs(prev => ({ ...prev, [ex.name]: e.target.value }))}
                          className="w-20 text-center text-sm rounded-lg px-2 py-2"
                          style={{background:'#0a0a0a', border:'1px solid #262626', color:'#fff'}}
                        />
                        <span className="text-xs text-gray-500">{settings.units}</span>
                      </div>
                    ) : (
                      <div className="text-xs text-gray-500 rounded-lg px-3 py-2" style={{background:'#0a0a0a', border:'1px solid #262626'}}>
                        Bodyweight / time
                      </div>
                    )}
                  </div>
                ))}
              </div>
            </div>

            <div className="card w-full max-w-md mb-6">
              <h3 className="font-bold mb-4 text-orange-100">How was today's session?</h3>
              <div className="space-y-3">
                <button 
                  className={`feedback-btn ${selectedFeedback === 'perfect' ? 'selected' : ''}`}

                    <span className="text-sm">✓</span>
                    <div className="text-left">
                      <div className="font-semibold text-sm">Perfect - dialed in</div>

                </button>
                <button 
                  className={`feedback-btn ${selectedFeedback === 'hard' ? 'selected' : ''}`}
                  onClick={() => setSelectedFeedback('hard')}
                >
                  <div className="flex items-center gap-3">
                    <span className="text-sm">↑</span>
                    <div className="text-left">
                      <div className="font-semibold text-sm">Too hard - need to adjust weight</div>
                      <div className="text-xs text-gray-500">Struggled with the weight, form suffered</div>
                    </div>
                  </div>
                </button>
                <button 
                  className={`feedback-btn ${selectedFeedback === 'easy' ? 'selected' : ''}`}
                  onClick={() => setSelectedFeedback('easy')}
                >
                  <div className="flex items-center gap-3">
                    <span className="text-sm">↓</span>
                    <div className="text-left">
                      <div className="font-semibold text-sm">Too easy - ready for progression</div>
                      <div className="text-xs text-gray-500">Could do more reps, increase weight next time</div>
                    </div>
                  </div>
                </button>
              </div>
            </div>

            <button
              type="button"
              className="nav-cta max-w-md w-full"
              onClick={() => {
                if (!selectedFeedback) return;
                const feedbackLabelMap = {
                  perfect: 'Perfect - dialed in',
                  hard: 'Too hard - need to adjust weight',
                  easy: 'Too easy - ready for progression'
                };
                // Append to weight history
                const updated = { ...exerciseWeights };
                Object.entries(weightInputs).forEach(([name, val]) => {
                  if (!doesExerciseTrackLoad(name)) return;
                  const w = parseFloat(val);
                  if (!isNaN(w) && w > 0) {
                    const history = Array.isArray(updated[name]) ? updated[name] : [];
                    const progressionMeta = getProgressionMeta(name);
                    updated[name] = [...history, {
                      weight: w,
                      date: new Date().toISOString(),
                      week: currentWeek,
                      day: currentDay,
                      cycleNumber: currentCycleNumber,
                      exerciseName: name,
                      progressionGroup: progressionMeta.key,
                      progressionLabel: progressionMeta.label
                    }];
                  }
                });
                setExerciseWeights(updated);
                handleWorkoutComplete(selectedFeedback, {
                  week: currentWeek,
                  day: currentDay,
                  enteredWeightCount,
                  feedbackLabel: feedbackLabelMap[selectedFeedback] || 'Saved'
                });

              disabled={!selectedFeedback}
            >
              {selectedFeedback
                ? enteredWeightCount > 0
                  ? 'Save Workout + Weights'
                  : 'Save Workout Only'
                : 'Select feedback to continue'}
            </button>
            
            <p className="text-sm text-gray-500 mt-4">Workout {actualWorkoutCount + 1} of {totalWorkouts} in {currentPhase} phase</p>
          </div>
        );

      function ProfileScreen() {
        const actualWorkoutCount = getActualWorkoutCount();

        // Real streak: consecutive calendar days with at least one completed workout
        const calculateStreak = () => {
          const completed = Object.values(workoutFeedback).filter(f => isWorkoutFeedbackType(f?.feedback) && f.date);
          if (completed.length === 0) return 0;

          // Unique calendar dates, sorted newest first
          const dates = [...new Set(completed.map(f => f.date.split('T')[0]))].sort().reverse();

          const today     = new Date().toISOString().split('T')[0];
          const yesterday = new Date(Date.now() - 86400000).toISOString().split('T')[0];

          // Streak must include today or yesterday
          if (dates[0] !== today && dates[0] !== yesterday) return 0;

          let streak = 1;
          for (let i = 1; i < dates.length; i++) {
            const diff = Math.round(
              (new Date(dates[i - 1]) - new Date(dates[i])) / 86400000
            );
            if (diff === 1) streak++;
            else break;
          }
          return streak;
        };

        const currentStreak = calculateStreak();
        const perfectWorkouts = Object.values(workoutFeedback).filter(f => f.feedback === 'perfect').length;

        // Calculate weight to display
        const displayWeight = (weight) => {
          if (!weight) return '';
          if (settings.units === 'kg') {
            return `${Math.round(weight * 0.453592)} kg`;
          }
          return `${weight} lbs`;
        };

        const buildAvatarDataUrl = (file) => new Promise((resolve, reject) => {
          const reader = new FileReader();
          reader.onerror = () => reject(new Error('read-failed'));
          reader.onload = () => {
            const image = new Image();
            image.onerror = () => reject(new Error('image-load-failed'));
            image.onload = () => {
              const width = image.naturalWidth || image.width;
              const height = image.naturalHeight || image.height;
              const side = Math.min(width, height);
              const offsetX = Math.max(0, Math.floor((width - side) / 2));
              const offsetY = Math.max(0, Math.floor((height - side) / 2));
              const targetSize = 320;
              const canvas = document.createElement('canvas');
              canvas.width = targetSize;
              canvas.height = targetSize;
              const context = canvas.getContext('2d');

              if (!context) {
                reject(new Error('canvas-unavailable'));
                return;
              }

              context.imageSmoothingEnabled = true;
              context.imageSmoothingQuality = 'high';
              context.drawImage(image, offsetX, offsetY, side, side, 0, 0, targetSize, targetSize);

              let quality = 0.9;
              let output = canvas.toDataURL('image/jpeg', quality);
              while (output.length > 180_000 && quality > 0.45) {
                quality -= 0.08;
                output = canvas.toDataURL('image/jpeg', quality);
              }

              if (output.length > 195_000) {
                reject(new Error('processed-too-large'));
                return;
              }

              resolve(output);
            };
            image.src = typeof reader.result === 'string' ? reader.result : '';
          };
          reader.readAsDataURL(file);
        });

        const handleProfileImageChange = async (event) => {
          const file = event.target.files?.[0];
          if (!file) return;

          if (!file.type.startsWith('image/')) {
            setError('Please choose an image file.');
            event.target.value = '';
            return;
          }

          if (file.size > 8_000_000) {
            setError('Profile photo must be smaller than 8 MB.');
            event.target.value = '';
            return;
          }

          try {
            const result = await buildAvatarDataUrl(file);
            setUserProfile(prev => ({
              ...prev,
              avatarDataUrl: result
            }));
            setError('');
            setSuccess('Profile photo updated!');
            setTimeout(() => setSuccess(''), 2500);
          } catch (error) {
            if (error.message === 'processed-too-large') {
              setError('That photo is too large to optimize. Try a different image.');
            } else {
              setError('Could not process that image. Try another file.');
            }
          }
          event.target.value = '';
        };

        const removeProfileImage = () => {
          setUserProfile(prev => ({
            ...prev,
            avatarDataUrl: ''
          }));
          setError('');
          setSuccess('Profile photo removed.');
          setTimeout(() => setSuccess(''), 2500);
        };

        return (
          <div className="app-screen">

            <div className="p-6">

                    </button>

                </div>
                <div className="text-xs text-gray-500 mb-3">Any normal photo works. We crop and optimize it automatically.</div>
                <div className="dev-badge">Cycle {currentCycleNumber} • Week {currentWeek}</div>
