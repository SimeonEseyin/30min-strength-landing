[build]
  command   = "npm run build"
  functions = "netlify/functions"
  publish   = "."

[functions]
  node_bundler = "esbuild"

[functions."send-workout-reminders"]
  schedule = "*/5 * * * *"

[[redirects]]
  from = "/app"
  to = "/devdad-app.html"
  status = 200

[[redirects]]
  from = "/favicon.ico"
  to = "/icons/favicon.ico"
  status = 200

[[headers]]
  for = "/*"
  [headers.values]
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com data:; img-src 'self' data: https:; connect-src 'self'; frame-src 'self' https://www.youtube.com https://www.youtube-nocookie.com; object-src 'none'; base-uri 'self'; frame-ancestors 'none'; form-action 'self' https://checkout.stripe.com; manifest-src 'self'; worker-src 'self';"
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"

[[headers]]
  for = "/.netlify/functions/*"
  [headers.values]
    X-Content-Type-Options = "nosniff"
