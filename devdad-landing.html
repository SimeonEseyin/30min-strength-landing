<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Redirecting | DevDad</title>
  <meta name="robots" content="noindex">
  <meta http-equiv="refresh" content="0;url=/">
  <style>
    :root {
      --bg: #0b0d11;
      --card: rgba(18, 22, 29, 0.92);
      --text: #f7f7f5;
      --muted: #bcc2cb;
      --accent: #f97316;
      --border: rgba(255, 255, 255, 0.08);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
      background:
        radial-gradient(circle at top left, rgba(249, 115, 22, 0.18), transparent 28%),
        linear-gradient(160deg, #101318 0%, #0a0d11 60%, #151922 100%);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    }

    .card {
      width: min(100%, 460px);
      padding: 28px;
      border-radius: 24px;
      background: var(--card);
      border: 1px solid var(--border);
      text-align: center;
      box-shadow: 0 24px 70px rgba(0, 0, 0, 0.34);
    }

    h1 {
      margin-bottom: 12px;
      font-size: 1.5rem;
    }

    p {
      color: var(--muted);
      line-height: 1.6;
    }

    a {
      display: inline-flex;
      margin-top: 18px;
      color: var(--accent);
      font-weight: 700;
      text-decoration: none;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>Redirecting to DevDad</h1>
    <p>You're being sent to the current DevDad homepage.</p>
    <a id="fallbackLink" href="/">Continue to DevDad</a>
  </div>

  <script>
    const target = new URL('/', window.location.origin);
    target.search = window.location.search;
    target.hash = window.location.hash;
    document.getElementById('fallbackLink').href = target.toString();
    window.location.replace(target.toString());
  </script>
</body>
</html>
