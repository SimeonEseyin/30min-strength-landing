<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dev Dad Strength | The 30-Minute System</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0a0a0a;
    }

    :root {
            --bg-primary: #000000;
            --bg-secondary: #000000;
            --bg-card: #181818;
            --bg-card-hover: #222222;
            --bg-selected: #e8e4db;
            --text-primary: #e8e4db;
            --text-secondary: #a09a90;
            --text-muted: #706b62;
            --text-dark: #000000;
            --accent: #f97316;
            --accent-hover: #fb923c;
            --accent-light: #fb923c;
            --accent-glow: rgba(249, 115, 22, 0.4);
            --success: #22c55e;
            --border: #333333;
    }
    .btn-primary {
      background: #0a0a0a;
      color: var(--accent);
      padding: 16px 32px;
      border-radius: 12px;
      font-weight: 600;
      width: 100%;
      border: none;
      cursor: pointer;
      transition: all 0.2s;
    }
    .btn-primary:hover {
      background: #1E4468;
    }
    .btn-secondary {
      background: #E8F0F7;
      color: var(--accent);
      padding: 16px 32px;
      border-radius: 12px;
      font-weight: 600;
      width: 100%;
      border: none;
      cursor: pointer;
    }

    .nav-cta {
      background: transparent;
      border: 1px solid var(--accent);
      border-radius: 12px;
      color: var(--accent);
      padding: 16px 32px;
      width: 100%;
      font-size: 0.875rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      cursor: pointer;
      transition: all 0.2s ease;
      text-decoration: none;
    }

    .nav-cta:hover {
      background: var(--accent);
      color: var(--bg-primary);
    }
    .card {
      background: #E8F0F7;
      border-radius: 16px;
      padding: 20px;
      margin-bottom: 16px;
      box-shadow: 0 2px 8px rgba(44,95,141,0.08);
      border: 1px solid #E8F0F7;
    }
    .exercise-card {
      background: white;
      border-radius: 12px;
      padding: 12px;
      margin-bottom: 12px;
      display: flex;
      align-items: center;
      gap: 12px;
      box-shadow: 0 1px 4px rgba(44,95,141,0.06);
      border: 1px solid #F0F4F8;
    }
    .day-tab {
      width: 60px;
      height: 80px;
      border-radius: 12px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: all 0.2s;
    }
    .day-tab.active {
      background: #2C5F8D;
      color: white;
      border: 3px solid #4A7BA7;
    }
    .day-tab.inactive {
      background: #E8F0F7;
      color: #2C5F8D;
    }
    .day-tab.locked {
      background: #F5F7F9;
      color: #CCC;
    }
    .progress-bar {
      height: 8px;
      background: #E8F0F7;
      border-radius: 4px;
      overflow: hidden;
    }
    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, #2C5F8D 0%, #4A7BA7 100%);
      transition: width 0.3s;
    }
    input[type="text"], input[type="email"], input[type="password"] {
      width: 100%;
      padding: 16px;
      border: 1px solid #E8F0F7;
      border-radius: 12px;
      background: white;
      font-size: 16px;
    }
    input[type="text"]:focus, input[type="email"]:focus, input[type="password"]:focus {
      outline: none;
      border-color: #2C5F8D;
    }
    .section-label {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 1px;
      color: #6B7280;
      margin: 24px 0 12px 0;
    }
    .dev-badge {
      display: inline-block;
      background: #E8F0F7;
      color: #2C5F8D;
      padding: 4px 12px;
      border-radius: 6px;
      font-size: 12px;
      font-weight: 600;
      font-family: 'Courier New', monospace;
    }

    .video-wrapper {
      position: relative;
      width: 100%;
      aspect-ratio: 16 / 9; /* responsive */
      overflow: hidden;
    }

    .video-wrapper video {
      width: 100%;
      height: 100%;
      object-fit: cover; /* 🔑 fills container */
      display: block;
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect } = React;

    // Mock exercise data
    const exercises = {
      day1: [
        { id: 1, name: 'Goblet Squat', duration: '0:45', sets: '3 sets × 12 reps', video: './site-videos/video-demo.MOV' },
        { id: 2, name: 'Dumbbell Shoulder Press', duration: '0:40', sets: '3 sets × 10 reps', image: '💪' },
        { id: 3, name: 'Dumbbell Floor Press', duration: '0:40', sets: '3 sets × 12 reps', image: '🏋️' },
        { id: 4, name: 'Lateral Raise', duration: '0:35', sets: '3 sets × 15 reps', image: '💪' },
        { id: 5, name: 'Plank', duration: '0:45', sets: 'Hold 45 sec', image: '🧘' },
      ],
      day2: [
        { id: 6, name: 'Romanian Deadlift', duration: '0:45', sets: '3 sets × 10 reps', image: '🏋️' },
        { id: 7, name: 'Bent-Over Row', duration: '0:40', sets: '3 sets × 12 reps', image: '💪' },
        { id: 8, name: 'Single-Arm Row', duration: '0:40', sets: '3 sets × 10 reps', image: '🏋️' },
        { id: 9, name: 'Reverse Fly', duration: '0:35', sets: '3 sets × 15 reps', image: '💪' },
        { id: 10, name: 'Bicep Curl', duration: '0:35', sets: '3 sets × 12 reps', image: '💪' },
      ],
      day3: [
        { id: 11, name: 'Bulgarian Split Squat', duration: '0:45', sets: '3 sets × 10 reps', image: '🏋️' },
        { id: 12, name: 'Single-Leg RDL', duration: '0:40', sets: '3 sets × 8 reps', image: '💪' },
        { id: 13, name: 'Walking Lunges', duration: '0:40', sets: '3 sets × 12 reps', image: '🚶' },
        { id: 14, name: 'Calf Raises', duration: '0:35', sets: '3 sets × 20 reps', image: '💪' },
        { id: 15, name: 'Dead Bug', duration: '0:40', sets: '3 sets × 10 reps', image: '🧘' },
      ],
      day4: [
        { id: 16, name: 'Dumbbell Thruster', duration: '0:45', sets: '3 sets × 12 reps', image: '🏋️' },
        { id: 17, name: 'Renegade Row', duration: '0:40', sets: '3 sets × 10 reps', image: '💪' },
        { id: 18, name: 'Dumbbell Swing', duration: '0:40', sets: '3 sets × 15 reps', image: '🏋️' },
        { id: 19, name: 'Push Press', duration: '0:35', sets: '3 sets × 12 reps', image: '💪' },
        { id: 20, name: 'Burpees', duration: '0:35', sets: '3 sets × 10 reps', image: '🤸' },
      ],
    };

    function App() {
      const [screen, setScreen] = useState('welcome');
      const [currentWeek, setCurrentWeek] = useState(1);
      const [currentDay, setCurrentDay] = useState(1);
      const [completedDays, setCompletedDays] = useState([]);
      const [workoutStarted, setWorkoutStarted] = useState(false);
      const [currentExercise, setCurrentExercise] = useState(0);
      const [email, setEmail] = useState('');

      const totalWeeks = 12;
      const currentPhase = currentWeek <= 4 ? 'Foundation' : currentWeek <= 8 ? 'Build' : 'Peak';

      const WelcomeScreen = () => (
        <div className="min-h-screen flex flex-col items-center justify-center p-6">
          <div className="max-w-md w-full">
            <div className="text-center mb-12">
              <h2 className="text-3xl font-bold mb-4" style={{color: '#2C5F8D'}}>Dev<span style={{color: '#f97316'}}>Dad </span></h2>
              <p className="text-lg text-gray-600">The 30-Minute System for Engineer Dads</p>
              <div className="dev-badge mt-3">WFH • Twins • Zero Excuses</div>
            </div>

            <div className="card text-center mb-6">
              <h3 className="text-xl font-bold mb-2" style={{color: '#2C5F8D'}}>Built by a Dev Dad, for Dads</h3>
              <p className="text-gray-600">Post-accident recovery → Full strength in 6 months</p>
              <p className="text-sm text-gray-500 mt-2">While managing twins + Oracle full-time</p>
            </div>

            <button className="nav-cta mb-2" onClick={() => setScreen('signup')}>
              Start Your System
            </button>
            <button className="nav-cta mb-2" onClick={() => setScreen('login')}>
              Log In
            </button>
          </div>
        </div>
      );

      const SignupScreen = () => (
        <div className="min-h-screen p-6">
          <div className="max-w-md mx-auto">
            <button onClick={() => setScreen('welcome')} className="mb-6 text-2xl">←</button>
            
            <h2 className="text-2xl font-bold mb-2" style={{color: '#2C5F8D'}}>Join the System</h2>
            <p className="text-gray-600 mb-6">Built by Simeon @ Oracle for engineer dads like you</p>

            <div className="space-y-4 mb-6">
              <input type="email" placeholder="Email" value={email} onChange={(e) => setEmail(e.target.value)} />
              <input type="password" placeholder="Password" />
            </div>

            <div className="card mb-6" style={{borderColor: '#2C5F8D', borderWidth: '2px'}}>
              <div className="flex items-center gap-3 mb-4">
                <span className="text-3xl">{'{ 💪 }'}</span>
                <div className="flex-1">
                  <h4 className="font-bold">The 30-Minute Strength System</h4>
                  <p className="text-sm text-gray-600">12-week progressive program</p>
                </div>
                <div className="text-right">
                  <div className="font-bold text-lg" style={{color: '#2C5F8D'}}>$87</div>
                  <div className="text-xs text-gray-500">one-time</div>
                </div>
              </div>
              <div className="space-y-2 text-sm text-gray-700">
                <div className="flex items-center gap-2">
                  <span style={{color: '#2C5F8D'}}>✓</span>
                  <span>30 minutes, 4 days/week (fits your schedule)</span>
                </div>
                <div className="flex items-center gap-2">
                  <span style={{color: '#2C5F8D'}}>✓</span>
                  <span>Pause/resume workouts (baby interruptions welcome)</span>
                </div>
                <div className="flex items-center gap-2">
                  <span style={{color: '#2C5F8D'}}>✓</span>
                  <span>23 exercise video library with form tips</span>
                </div>
                <div className="flex items-center gap-2">
                  <span style={{color: '#2C5F8D'}}>✓</span>
                  <span>Progressive overload tracking (engineer's approach)</span>
                </div>
                <div className="flex items-center gap-2">
                  <span style={{color: '#2C5F8D'}}>✓</span>
                  <span>Only need: adjustable dumbbells + 6×6 space</span>
                </div>
              </div>
            </div>

            <button className="nav-cta mb-3" onClick={() => setScreen('home')}>
              Get The System - $87
            </button>

            <p className="text-xs text-center text-gray-500 mt-4">
              30-day money-back guarantee • By continuing you accept our Terms & Privacy Policy
            </p>
          </div>
        </div>
      );

      const LoginScreen = () => (
        <div className="min-h-screen p-6">
          <div className="max-w-md mx-auto">
            <button onClick={() => setScreen('welcome')} className="mb-6 text-2xl">←</button>
            
            <h2 className="text-2xl font-bold mb-2" style={{color: '#f97316'}}>Welcome Back</h2>
            <p className="text-gray-600 mb-8">Log in to continue your strength system</p>

            <div className="space-y-4 mb-6">
              <input type="email" placeholder="Email" />
              <input type="password" placeholder="Password" />
            </div>

            <button className="nav-cta mb-3" onClick={() => setScreen('home')}>
              Log In
            </button>

            <div className="text-center">
              <button className="text-gray-600">Forgot Password?</button>
            </div>
          </div>
        </div>
      );

      const HomeScreen = () => (
        <div className="min-h-screen pb-20">
          {/* Header */}
          <div className="bg-white p-6 border-b border-gray-200">
            <div className="flex justify-between items-center mb-3">
              <div>
                <h1 className="text-2xl font-bold" style={{color: '#2C5F8D'}}>Dev<span style={{color: '#f97316'}}>Dad</span> Strength</h1>
                <div className="dev-badge mt-1">Week {currentWeek} • {currentPhase}</div>
              </div>
              <button onClick={() => setScreen('profile')} className="w-10 h-10 rounded-full flex items-center justify-center font-bold" style={{background: '#2C5F8D', color: 'white'}}>
                S
              </button>
            </div>
          </div>

          {/* Week selector */}
          <div className="p-6 overflow-x-auto">
            <div className="flex gap-3">
              {[1, 2, 3, 4, 5, 6, 7].map(day => {
                const isActive = day === currentDay;
                const isCompleted = completedDays.includes(day);
                const isLocked = day > currentDay && !isCompleted;
                
                return (
                  <div 
                    key={day}
                    className={`day-tab ${isActive ? 'active' : isCompleted ? 'inactive' : 'locked'}`}
                    onClick={() => !isLocked && setCurrentDay(day)}
                  >
                    {isCompleted ? (
                      <>
                        <div className="text-2xl mb-1">✓</div>
                        <div className="text-xs">Day {day}</div>
                      </>
                    ) : (
                      <>
                        <div className="text-2xl mb-1">{isLocked ? '🔒' : '💪'}</div>
                        <div className="text-xs">Day {day}</div>
                      </>
                    )}
                  </div>
                );
              })}
            </div>
          </div>

          {/* Main Goal */}
          <div className="px-6 mb-6">
            <div className="flex gap-4">
              <div className="card flex-1">
                <div className="text-sm text-gray-600 mb-1">Main Goal</div>
                <div className="text-lg font-bold">Build Strength</div>
              </div>
              <div className="card flex-1">
                <div className="text-sm text-gray-600 mb-1">Current Week</div>
                <div className="text-lg font-bold">Week {currentWeek}</div>
              </div>
            </div>
          </div>

          {/* Progress */}
          <div className="px-6 mb-6">
            <div className="card">
              <div className="flex justify-between items-center mb-3">
                <h3 className="font-bold">Your Progress</h3>
                <span className="text-sm text-gray-600">{completedDays.length} of 28 workouts</span>
              </div>
              <div className="progress-bar">
                <div className="progress-fill" style={{ width: `${(completedDays.length / 28) * 100}%` }}></div>
              </div>
              <div className="mt-3 text-sm text-gray-600">
                Phase {currentWeek <= 4 ? '1' : currentWeek <= 8 ? '2' : '3'}: {currentPhase}
              </div>
            </div>
          </div>

          {/* Today's Workout */}
          <div className="px-6 mb-6">
            <h3 className="text-xl font-bold mb-4">Today's Session</h3>
            
            <div className="card mb-4">
              <div className="flex items-center gap-4 mb-4">
                <div className="w-20 h-20 rounded-lg flex items-center justify-center text-3xl" style={{background: '#E8F0F7'}}>
                  {'{ 💪 }'}
                </div>
                <div className="flex-1">
                  <h4 className="font-bold text-lg mb-1">
                    Day {currentDay}: {currentDay === 1 ? 'Push Day' : currentDay === 2 ? 'Pull Day' : currentDay === 3 ? 'Lower Body' : currentDay === 4 ? 'Full Body Power' : 'Recovery'}
                  </h4>
                  <p className="text-sm text-gray-600">30 min • {exercises[`day${currentDay}`]?.length || 5} exercises</p>
                  <div className="dev-badge mt-2">Pause-friendly • Baby-proof</div>
                </div>
              </div>
              
              <button 
                className="nav-cta"
                onClick={() => {
                  setScreen('workout');
                  setWorkoutStarted(true);
                  setCurrentExercise(0);
                }}
              >
                Start Workout
              </button>
            </div>

            {/* Exercise List */}
            <div className="section-label">EXERCISES</div>
            {(exercises[`day${currentDay}`] || exercises.day1).map((ex, idx) => (
              <div key={ex.id} className="exercise-card">
                <div className="w-16 h-16 bg-gray-100 rounded-lg flex items-center justify-center text-2xl">
                  {ex.image}
                </div>
                <div className="flex-1">
                  <h4 className="font-semibold">{ex.name}</h4>
                  <p className="text-sm text-gray-600">{ex.duration}</p>
                </div>
                <button className="text-gray-400">ℹ️</button>
              </div>
            ))}
          </div>

          {/* Bottom Nav */}
          <div className="fixed bottom-0 left-0 right-0 bg-white border-t border-gray-200 flex">
            <button className="flex-1 py-4 flex flex-col items-center gap-1" style={{background: '#E8F0F7'}}>
              <span className="text-xl">📋</span>
              <span className="text-xs font-semibold" style={{color: '#2C5F8D'}}>Plan</span>
            </button>
            <button className="flex-1 py-4 flex flex-col items-center gap-1" onClick={() => setScreen('progress')}>
              <span className="text-xl">📊</span>
              <span className="text-xs">Progress</span>
            </button>
            <button className="flex-1 py-4 flex flex-col items-center gap-1" onClick={() => setScreen('more')}>
              <span className="text-xl">☰</span>
              <span className="text-xs">More</span>
            </button>
          </div>
        </div>
      );

      const WorkoutScreen = () => {
        const dayExercises = exercises[`day${currentDay}`] || exercises.day1;
        const exercise = dayExercises[currentExercise];
        const isLastExercise = currentExercise === dayExercises.length - 1;

        return (
          <div className="min-h-screen text-white" style={{background: '#1A1A1A'}}>
            <button onClick={() => setScreen('home')} className="absolute top-6 left-6 text-3xl z-10">×</button>
            
            {/* Exercise Demo */}
            <div className="h-96 flex items-center justify-center text-8xl video-wrapper video" style={{background: '#0a0a0a'}}>
              <video
                src={exercise.video}
                controls
                loop
                muted
                playsInline
                preload="metadata"
                width="100%"
              />
            </div>

            {/* Exercise Info */}
            <div className="p-6">
              <div className="dev-badge mb-3" style={{background: '#252525', color: '#fb923c'}}>
                Exercise {currentExercise + 1} of {dayExercises.length}
              </div>
              <h2 className="text-2xl font-bold mb-2">{exercise.name}</h2>
              <p className="text-gray-400 mb-6">{exercise.sets}</p>

              {/* Instructions */}
              <div className="rounded-lg p-4 mb-6" style={{background: '#252525'}}>
                <h3 className="font-bold mb-3">EXECUTION:</h3>
                <ol className="space-y-2 text-sm text-gray-300">
                  <li>• Position yourself with proper form and core engaged</li>
                  <li>• Control the weight through full range of motion</li>
                  <li>• Maintain tension throughout - no momentum</li>
                  <li>• Rest 60-90 seconds between sets</li>
                </ol>
              </div>

              {/* Navigation */}
              <div className="flex gap-3">
                <button 
                  className="btn-secondary flex-1"
                  onClick={() => currentExercise > 0 && setCurrentExercise(currentExercise - 1)}
                  disabled={currentExercise === 0}
                  style={currentExercise === 0 ? {opacity: 0.5} : {}}
                >
                  ← Previous
                </button>
                <button 
                  className="nav-cta flex-1"
                  onClick={() => {
                    if (isLastExercise) {
                      setCompletedDays([...completedDays, currentDay]);
                      setScreen('complete');
                    } else {
                      setCurrentExercise(currentExercise + 1);
                    }
                  }}
                >
                  {isLastExercise ? 'Complete ✓' : 'Next →'}
                </button>
              </div>

              {/* Progress indicator */}
              <div className="mt-6">
                <div className="progress-bar">
                  <div className="progress-fill" style={{ width: `${((currentExercise + 1) / dayExercises.length) * 100}%` }}></div>
                </div>
                <div className="mt-2 text-center text-sm text-gray-500">
                  ~{(dayExercises.length - currentExercise - 1) * 6} minutes remaining
                </div>
              </div>
            </div>
          </div>
        );
      };

      const CompleteScreen = () => (
        <div className="min-h-screen flex flex-col items-center justify-center p-6 text-center">
          <div className="text-6xl mb-6">{'{ 💪 }'}</div>
          <h2 className="text-3xl font-bold mb-3"  style={{color: '#f97316'}}>Day {currentDay} Complete!</h2>
          <p className="text-gray-600 mb-8">Strength earned. System working.</p>
          
          <div className="card w-full max-w-md mb-6">
            <h3 className="font-bold mb-4">How was today's session?</h3>
            <div className="space-y-3">
              <button className="w-full p-3 border-2 rounded-lg text-left flex items-center gap-3" style={{borderColor: '#E8F0F7'}}>
                <span>✓</span>
                <span>Perfect - dialed in</span>
              </button>
              <button className="w-full p-3 border-2 rounded-lg text-left flex items-center gap-3" style={{borderColor: '#E8F0F7'}}>
                <span>↑</span>
                <span>Too hard - need to adjust weight</span>
              </button>
              <button className="w-full p-3 border-2 rounded-lg text-left flex items-center gap-3" style={{borderColor: '#E8F0F7'}}>
                <span>↓</span>
                <span>Too easy - ready for progression</span>
              </button>
            </div>
          </div>

          <button className="nav-cta max-w-md w-full" onClick={() => {
            if (currentDay < 7) {
              setCurrentDay(currentDay + 1);
            } else if (currentWeek < 12) {
              setCurrentWeek(currentWeek + 1);
              setCurrentDay(1);
            }
            setScreen('home');
            setWorkoutStarted(false);
          }}>
            Continue
          </button>
          
          <p className="text-sm text-gray-500 mt-4">Workout {completedDays.length + 1} of 28 in {currentPhase} phase</p>
        </div>
      );

      const ProgressScreen = () => (
        <div className="min-h-screen pb-20">
          <div className="bg-white p-6 border-b border-gray-200">
            <h1 className="text-2xl font-bold" style={{color: '#2C5F8D'}}>Progress</h1>
            <div className="dev-badge mt-2">Tracking your system execution</div>
          </div>

          <div className="p-6">
            {/* Stats Cards */}
            <div className="grid grid-cols-2 gap-4 mb-6">
              <div className="card">
                <div className="text-sm text-gray-600 mb-1">Workouts</div>
                <div className="text-2xl font-bold" style={{color: '#2C5F8D'}}>{completedDays.length}</div>
                <div className="text-xs text-gray-500">of 28 completed</div>
              </div>
              <div className="card">
                <div className="text-sm text-gray-600 mb-1">Current Week</div>
                <div className="text-2xl font-bold" style={{color: '#2C5F8D'}}>{currentWeek}</div>
                <div className="text-xs text-gray-500">of 12 weeks</div>
              </div>
            </div>

            {/* Weekly Progress */}
            <div className="card">
              <h3 className="font-bold mb-4">Week {currentWeek} Progress</h3>
              <div className="space-y-3">
                {[1, 2, 3, 4, 5, 6, 7].map(day => (
                  <div key={day} className="flex items-center gap-3">
                    <div className={`w-8 h-8 rounded-full flex items-center justify-center ${completedDays.includes(day) ? 'text-white' : 'bg-gray-200'}`} style={completedDays.includes(day) ? {background: '#2C5F8D'} : {}}>
                      {completedDays.includes(day) ? '✓' : day}
                    </div>
                    <div className="flex-1">
                      <div className="text-sm font-semibold">Day {day}</div>
                    </div>
                    <div className="text-xs text-gray-500">
                      {completedDays.includes(day) ? '30 min' : '-'}
                    </div>
                  </div>
                ))}
              </div>
            </div>

            {/* Phase Indicator */}
            <div className="card mt-4">
              <div className="text-sm text-gray-600 mb-2">Current Phase</div>
              <div className="text-lg font-bold mb-3" style={{color: '#2C5F8D'}}>
                {currentPhase} (Weeks {currentWeek <= 4 ? '1-4' : currentWeek <= 8 ? '5-8' : '9-12'})
              </div>
              <div className="text-sm text-gray-600">
                {currentPhase === 'Foundation' && 'Focus: Form and movement patterns'}
                {currentPhase === 'Build' && 'Focus: Adding weight and volume'}
                {currentPhase === 'Peak' && 'Focus: Maximum strength development'}
              </div>
            </div>
          </div>

          {/* Bottom Nav */}
          <div className="fixed bottom-0 left-0 right-0 bg-white border-t border-gray-200 flex">
            <button className="flex-1 py-4 flex flex-col items-center gap-1" onClick={() => setScreen('home')}>
              <span className="text-xl">📋</span>
              <span className="text-xs">Plan</span>
            </button>
            <button className="flex-1 py-4 flex flex-col items-center gap-1" style={{background: '#E8F0F7'}}>
              <span className="text-xl">📊</span>
              <span className="text-xs font-semibold" style={{color: '#2C5F8D'}}>Progress</span>
            </button>
            <button className="flex-1 py-4 flex flex-col items-center gap-1" onClick={() => setScreen('more')}>
              <span className="text-xl">☰</span>
              <span className="text-xs">More</span>
            </button>
          </div>
        </div>
      );

      const MoreScreen = () => (
        <div className="min-h-screen pb-20">
          <div className="bg-white p-6 border-b border-gray-200">
            <h1 className="text-2xl font-bold" style={{color: '#2C5F8D'}}>More</h1>
            <div className="dev-badge mt-2">System settings & resources</div>
          </div>

          <div className="p-6">
            <div className="section-label">YOUR PROGRESS</div>
            <button className="w-full p-4 bg-white rounded-lg mb-3 flex items-center justify-between" onClick={() => setScreen('progress')}>
              <div className="flex items-center gap-3">
                <span className="text-xl">💪</span>
                <span className="font-semibold">Workouts</span>
              </div>
              <span className="text-gray-400">›</span>
            </button>

            <div className="section-label">SETTINGS</div>
            <button className="w-full p-4 bg-white rounded-lg mb-3 flex items-center justify-between" onClick={() => setScreen('profile')}>
              <div className="flex items-center gap-3">
                <span className="text-xl">👤</span>
                <span className="font-semibold">My Profile</span>
              </div>
              <span className="text-gray-400">›</span>
            </button>
            <button className="w-full p-4 bg-white rounded-lg mb-3 flex items-center justify-between">
              <div className="flex items-center gap-3">
                <span className="text-xl">⚙️</span>
                <span className="font-semibold">Settings</span>
              </div>
              <span className="text-gray-400">›</span>
            </button>

            <div className="section-label">HELP</div>
            <button className="w-full p-4 bg-white rounded-lg mb-3 flex items-center justify-between">
              <div className="flex items-center gap-3">
                <span className="text-xl">❓</span>
                <span className="font-semibold">Help Center</span>
              </div>
              <span className="text-gray-400">›</span>
            </button>
          </div>

          {/* Bottom Nav */}
          <div className="fixed bottom-0 left-0 right-0 bg-white border-t border-gray-200 flex">
            <button className="flex-1 py-4 flex flex-col items-center gap-1" onClick={() => setScreen('home')}>
              <span className="text-xl">📋</span>
              <span className="text-xs">Plan</span>
            </button>
            <button className="flex-1 py-4 flex flex-col items-center gap-1" onClick={() => setScreen('progress')}>
              <span className="text-xl">📊</span>
              <span className="text-xs">Progress</span>
            </button>
            <button className="flex-1 py-4 flex flex-col items-center gap-1" style={{background: '#E8F0F7'}}>
              <span className="text-xl">☰</span>
              <span className="text-xs font-semibold" style={{color: '#2C5F8D'}}>More</span>
            </button>
          </div>
        </div>
      );

      const ProfileScreen = () => (
        <div className="min-h-screen">
          <div className="bg-white p-6 border-b border-gray-200">
            <div className="flex items-center gap-3">
              <button onClick={() => setScreen('more')} className="text-2xl">←</button>
              <h1 className="text-2xl font-bold" style={{color: '#2C5F8D'}}>My Profile</h1>
            </div>
          </div>

          <div className="p-6">
            <div className="card mb-4 text-center">
              <div className="w-20 h-20 rounded-full mx-auto mb-3 flex items-center justify-center font-bold text-2xl" style={{background: '#2C5F8D', color: 'white'}}>
                S
              </div>
              <div className="font-bold text-lg mb-1">{email || 'Engineer Dad'}</div>
              <div className="dev-badge">Active since Week 1</div>
            </div>

            <div className="section-label">SYSTEM CONFIGURATION</div>
            <button className="w-full p-4 bg-white rounded-lg mb-3 flex items-center justify-between">
              <span className="font-semibold">Fitness Level</span>
              <span className="text-gray-600">Intermediate</span>
            </button>
            <button className="w-full p-4 bg-white rounded-lg mb-3 flex items-center justify-between">
              <span className="font-semibold">Equipment</span>
              <span className="text-gray-600">Adjustable Dumbbells</span>
            </button>
            <button className="w-full p-4 bg-white rounded-lg mb-3 flex items-center justify-between">
              <span className="font-semibold">Workout Schedule</span>
              <span className="text-gray-600">4 days/week</span>
            </button>
            <button className="w-full p-4 bg-white rounded-lg mb-3 flex items-center justify-between">
              <span className="font-semibold">Workout Duration</span>
              <span className="text-gray-600">30 minutes</span>
            </button>

            <div className="section-label">ACCOUNT</div>
            <button className="w-full p-4 bg-white rounded-lg mb-3 flex items-center justify-between">
              <span className="font-semibold">Email</span>
              <span className="text-gray-600 text-sm">{email || 'user@example.com'}</span>
            </button>

            <button className="btn-secondary mt-6" onClick={() => setScreen('welcome')}>
              Log Out
            </button>
          </div>
        </div>
      );

      // Render current screen
      return (
        <div className="max-w-md mx-auto bg-white min-h-screen shadow-xl">
          {screen === 'welcome' && <WelcomeScreen />}
          {screen === 'signup' && <SignupScreen />}
          {screen === 'login' && <LoginScreen />}
          {screen === 'home' && <HomeScreen />}
          {screen === 'workout' && <WorkoutScreen />}
          {screen === 'complete' && <CompleteScreen />}
          {screen === 'progress' && <ProgressScreen />}
          {screen === 'more' && <MoreScreen />}
          {screen === 'profile' && <ProfileScreen />}
        </div>
      );
    }

    ReactDOM.render(<App />, document.getElementById('root'));
  </script>

  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</body>
</html>
